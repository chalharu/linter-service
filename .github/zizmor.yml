rules:
  secrets-outside-env:
    # `config.allow` is configurable in zizmor v1.24.0 and later.
    # Keep the temporary line-level ignores below until this repository
    # upgrades, then remove them as tracked in issue #23.
    config:
      allow:
        - CHECKER_APP_ID
        - CHECKER_PRIVATE_KEY
    ignore:
      - lint-common.yml:89
      - lint-common.yml:92
      - repository-dispatch.yml:92
      - repository-dispatch.yml:95
      - repository-dispatch.yml:349
      - repository-dispatch.yml:352
      - repository-dispatch.yml:553
      - repository-dispatch.yml:556
      - repository-dispatch.yml:563
      - repository-dispatch.yml:566

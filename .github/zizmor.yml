rules:
  secrets-outside-env:
    # `config.allow` is configurable in zizmor v1.24.0 and later.
    # Keep the temporary line-level ignores below until this repository
    # upgrades, then remove them as tracked in issue #23.
    config:
      allow:
        - CHECKER_APP_ID
        - CHECKER_PRIVATE_KEY
    ignore:
      - lint-common.yml:69
      - lint-common.yml:72
      - lint-common.yml:250
      - repository-dispatch.yml:121
      - repository-dispatch.yml:124
      - repository-dispatch.yml:342
      - repository-dispatch.yml:345
      - repository-dispatch.yml:394
      - repository-dispatch.yml:395
      - repository-dispatch.yml:465
      - repository-dispatch.yml:468
      - repository-dispatch.yml:475
      - repository-dispatch.yml:478
      - repository-dispatch.yml:484

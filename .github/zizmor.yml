rules:
  secrets-outside-env:
    # `config.allow` is configurable in zizmor v1.24.0 and later.
    # Keep the temporary line-level ignores below until this repository
    # upgrades, then remove them as tracked in issue #23.
    config:
      allow:
        - CHECKER_APP_ID
        - CHECKER_PRIVATE_KEY
    ignore:
      - lint-common.yml:78
      - lint-common.yml:81
      - repository-dispatch.yml:112
      - repository-dispatch.yml:115
      - repository-dispatch.yml:358
      - repository-dispatch.yml:361
      - repository-dispatch.yml:527
      - repository-dispatch.yml:530
      - repository-dispatch.yml:537
      - repository-dispatch.yml:540

rules:
  secrets-outside-env:
    # `config.allow` is configurable in zizmor v1.24.0 and later.
    # Keep the temporary line-level ignores below until this repository
    # upgrades, then remove them as tracked in issue #23.
    config:
      allow:
        - CHECKER_APP_ID
        - CHECKER_PRIVATE_KEY
    ignore:
      - lint-common.yml:88
      - lint-common.yml:90
      - repository-dispatch.yml:81
      - repository-dispatch.yml:83
      - repository-dispatch.yml:326
      - repository-dispatch.yml:328
      - repository-dispatch.yml:506
      - repository-dispatch.yml:508
      - repository-dispatch.yml:515
      - repository-dispatch.yml:517

rules:
  secrets-outside-env:
    # `config.allow` is configurable in zizmor v1.24.0 and later.
    # Keep the temporary line-level ignores below until this repository
    # upgrades, then remove them as tracked in issue #23.
    config:
      allow:
        - CHECKER_APP_ID
        - CHECKER_PRIVATE_KEY
    ignore:
      - lint-common.yml:69
      - lint-common.yml:72
      - repository-dispatch.yml:125
      - repository-dispatch.yml:128
      - repository-dispatch.yml:346
      - repository-dispatch.yml:349
      - repository-dispatch.yml:398
      - repository-dispatch.yml:399
      - repository-dispatch.yml:461
      - repository-dispatch.yml:464
      - repository-dispatch.yml:471
      - repository-dispatch.yml:474

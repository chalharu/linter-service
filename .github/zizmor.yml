rules:
  secrets-outside-env:
    # `config.allow` is configurable in zizmor v1.24.0 and later.
    # Keep the temporary line-level ignores below until this repository
    # upgrades, then remove them as tracked in issue #23.
    config:
      allow:
        - CHECKER_APP_ID
        - CHECKER_PRIVATE_KEY
    ignore:
      - lint-common.yml:89
      - lint-common.yml:92
      - repository-dispatch.yml:87
      - repository-dispatch.yml:90
      - repository-dispatch.yml:339
      - repository-dispatch.yml:342
      - repository-dispatch.yml:532
      - repository-dispatch.yml:535
      - repository-dispatch.yml:542
      - repository-dispatch.yml:545

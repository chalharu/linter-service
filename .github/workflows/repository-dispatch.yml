name: Repository Dispatch

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  repository_dispatch:
    types:
      - github_app_webhook

permissions: {}

jobs:
  detect-targets:
    runs-on: ubuntu-latest
    outputs:
      actionlint-selected: ${{ steps.collect.outputs.actionlint-selected }}
      pull-request-number: ${{ steps.collect.outputs.pull-request-number }}
      selected-linters-json: ${{ steps.collect.outputs.selected-linters-json }}
      skip-reason: ${{ steps.collect.outputs.skip-reason }}
      yamllint-selected: ${{ steps.collect.outputs.yamllint-selected }}
      zizmor-selected: ${{ steps.collect.outputs.zizmor-selected }}
    env:
      LINTER_DEFINITIONS_JSON: >-
        [
          {
            "name": "actionlint",
            "patterns": ["^\\.github\\/workflows\\/.+\\.(?:yaml|yml)$"]
          },
          {
            "name": "yamllint",
            "patterns": ["\\.(?:yaml|yml)$"]
          },
          {
            "name": "zizmor",
            "patterns": ["^\\.github\\/workflows\\/.+\\.(?:yaml|yml)$"]
          }
        ]
      PR_REPOSITORY_NAME: ${{ github.event_name == 'pull_request' && github.event.repository.name || github.event.client_payload.repository.name }}
      PR_REPOSITORY_OWNER: ${{ github.event_name == 'pull_request' && github.event.repository.owner.login || github.event.client_payload.repository.owner.login }}
      PULL_REQUEST_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.client_payload.pull_request.number }}
      SOURCE_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.client_payload.pull_request.head.sha || github.event.client_payload.check_run.head_sha }}
    steps:
      - name: Validate pull request metadata
        run: |
          test -n "$PR_REPOSITORY_OWNER" || {
            echo "PR_REPOSITORY_OWNER is required" >&2
            exit 1
          }
          test -n "$PR_REPOSITORY_NAME" || {
            echo "PR_REPOSITORY_NAME is required" >&2
            exit 1
          }
          case "$PULL_REQUEST_NUMBER" in
            ''|*[!0-9]*)
              echo "PULL_REQUEST_NUMBER must be a positive integer" >&2
              exit 1
              ;;
          esac
          test "$PULL_REQUEST_NUMBER" -gt 0 || {
            echo "PULL_REQUEST_NUMBER must be a positive integer" >&2
            exit 1
          }

      - name: Mask repository metadata
        run: |
          echo "::add-mask::$PR_REPOSITORY_OWNER"
          echo "::add-mask::$PR_REPOSITORY_NAME"
          echo "::add-mask::$PR_REPOSITORY_OWNER/$PR_REPOSITORY_NAME"
          if [ -n "$SOURCE_HEAD_SHA" ]; then
            echo "::add-mask::$SOURCE_HEAD_SHA"
          fi

      - name: Get checker token
        id: get_checker_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ env.PR_REPOSITORY_OWNER }}
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ env.PR_REPOSITORY_NAME }}

      - name: Collect pull request context
        id: collect
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          LINTER_DEFINITIONS_JSON: ${{ env.LINTER_DEFINITIONS_JSON }}
          PR_REPOSITORY_NAME: ${{ env.PR_REPOSITORY_NAME }}
          PR_REPOSITORY_OWNER: ${{ env.PR_REPOSITORY_OWNER }}
          PULL_REQUEST_NUMBER: ${{ env.PULL_REQUEST_NUMBER }}
          SOURCE_HEAD_SHA: ${{ env.SOURCE_HEAD_SHA }}
        with:
          github-token: ${{ steps.get_checker_token.outputs.token }}
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const owner = process.env.PR_REPOSITORY_OWNER;
            const repo = process.env.PR_REPOSITORY_NAME;
            const pullNumber = Number(process.env.PULL_REQUEST_NUMBER);
            const sourceHeadShaFromPayload = process.env.SOURCE_HEAD_SHA || "";
            const definitions = JSON.parse(process.env.LINTER_DEFINITIONS_JSON ?? "[]");
            const contextPath = path.join(
              process.env.RUNNER_TEMP,
              "detect-targets-context.json",
            );
            const writeContext = (contextValues) => {
              fs.writeFileSync(
                contextPath,
                JSON.stringify(contextValues),
                "utf8",
              );
              core.setOutput("context-path", contextPath);
            };
            const isSelfRepositoryDispatch =
              context.eventName === "repository_dispatch" &&
              owner.toLowerCase() === context.repo.owner.toLowerCase() &&
              repo.toLowerCase() === context.repo.repo.toLowerCase();

            if (!Array.isArray(definitions)) {
              throw new Error("LINTER_DEFINITIONS_JSON must be a JSON array");
            }

            if (isSelfRepositoryDispatch) {
              const skipReason =
                "Skipping repository_dispatch for this repository because local pull requests are handled by the direct pull_request trigger.";

              const contextValues = {
                changed_files: [],
                pr_owner: owner,
                pr_repo: repo,
                processing_check_external_id: "",
                processing_check_name: "linter-service",
                selected_linters: [],
                skip_reason: skipReason,
                source_head_sha: sourceHeadShaFromPayload,
                source_owner: owner,
                source_repo: repo,
              };

              for (const definition of definitions) {
                if (
                  !definition ||
                  typeof definition !== "object" ||
                  typeof definition.name !== "string" ||
                  !Array.isArray(definition.patterns)
                ) {
                  throw new Error("Each linter definition must include name and patterns");
                }
              }

              writeContext(contextValues);
              core.setOutput("actionlint-selected", "false");
              core.setOutput("pull-request-number", String(pullNumber));
              core.setOutput("selected-linters-json", JSON.stringify([]));
              core.setOutput("skip-reason", skipReason);
              core.setOutput("yamllint-selected", "false");
              core.setOutput("zizmor-selected", "false");
              return;
            }

            const pull = (
              await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              })
            ).data;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const currentFiles = files
              .filter((file) => file.status !== "removed")
              .map((file) => file.filename);

            const sourceOwner = pull.head.repo?.owner?.login ?? owner;
            const sourceRepo = pull.head.repo?.name ?? repo;
            const sourceHeadSha = sourceHeadShaFromPayload || pull.head.sha;

            if (!sourceHeadSha) {
              throw new Error("pull request head SHA is required");
            }

            const selectedLinters = [];

            for (const definition of definitions) {
              if (
                !definition ||
                typeof definition !== "object" ||
                typeof definition.name !== "string" ||
                !Array.isArray(definition.patterns)
              ) {
                throw new Error("Each linter definition must include name and patterns");
              }

              const patterns = definition.patterns.map((pattern) => {
                if (typeof pattern !== "string") {
                  throw new Error("Linter patterns must be strings");
                }

                return new RegExp(pattern, "i");
              });
              const selected = currentFiles.some((path) =>
                patterns.some((pattern) => pattern.test(path)),
              );

              if (selected) {
                selectedLinters.push(definition.name);
              }
            }

            writeContext({
              changed_files: currentFiles,
              pr_owner: owner,
              pr_repo: repo,
              processing_check_external_id: `linter-service:${pullNumber}:${sourceHeadSha}`,
              processing_check_name: "linter-service",
              selected_linters: selectedLinters,
              skip_reason: "",
              source_head_sha: sourceHeadSha,
              source_owner: sourceOwner,
              source_repo: sourceRepo,
            });
            core.setOutput(
              "actionlint-selected",
              String(selectedLinters.includes("actionlint")),
            );
            core.setOutput("pull-request-number", String(pullNumber));
            core.setOutput("selected-linters-json", JSON.stringify(selectedLinters));
            core.setOutput("skip-reason", "");
            core.setOutput(
              "yamllint-selected",
              String(selectedLinters.includes("yamllint")),
            );
            core.setOutput(
              "zizmor-selected",
              String(selectedLinters.includes("zizmor")),
            );

      - name: Report routing status
        env:
          SELECTED_LINTERS_JSON: ${{ steps.collect.outputs.selected-linters-json }}
        run: |
          echo "Routing targets resolved."
          echo "Selected linters: ${SELECTED_LINTERS_JSON}"

      - name: Upload dispatch context artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: detect-targets-context
          path: ${{ steps.collect.outputs.context-path }}
          if-no-files-found: error
          retention-days: 1

  notify-processing-started:
    needs: detect-targets
    if: ${{ needs.detect-targets.outputs.selected-linters-json != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download dispatch context artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: detect-targets-context
          path: ${{ runner.temp }}/detect-targets-context

      - name: Mask repository metadata
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          context = json.loads(Path(os.environ["CONTEXT_PATH"]).read_text(encoding="utf-8"))
          source_owner = context["source_owner"]
          source_repo = context["source_repo"]
          source_head_sha = context["source_head_sha"]

          for value in (source_owner, source_repo, source_head_sha):
              if value:
                  print(f"::add-mask::{value}")

          if source_owner and source_repo:
              print(f"::add-mask::{source_owner}/{source_repo}")
          PY

      - name: Decode source repository context
        id: decode_source_context
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          context = json.loads(Path(os.environ["CONTEXT_PATH"]).read_text(encoding="utf-8"))
          source_owner = context["source_owner"]
          source_repo = context["source_repo"]
          values = {
              "processing-check-external-id": context["processing_check_external_id"],
              "processing-check-name": context["processing_check_name"],
              "source-head-sha": context["source_head_sha"],
              "source-owner": source_owner,
              "source-repo": source_repo,
          }

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              for key, value in values.items():
                  fh.write(f"{key}={value}\n")
          PY

      - name: Get source repository checker token
        id: get_source_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ steps.decode_source_context.outputs.source-owner }}
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ steps.decode_source_context.outputs.source-repo }}

      - name: Notify processing start
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PROCESSING_CHECK_EXTERNAL_ID: ${{ steps.decode_source_context.outputs.processing-check-external-id }}
          PROCESSING_CHECK_NAME: ${{ steps.decode_source_context.outputs.processing-check-name }}
          SELECTED_LINTERS_JSON: ${{ needs.detect-targets.outputs.selected-linters-json }}
          SOURCE_HEAD_SHA: ${{ steps.decode_source_context.outputs.source-head-sha }}
          SOURCE_OWNER: ${{ steps.decode_source_context.outputs.source-owner }}
          SOURCE_REPO: ${{ steps.decode_source_context.outputs.source-repo }}
        with:
          github-token: ${{ steps.get_source_token.outputs.token }}
          script: |
            const owner = process.env.SOURCE_OWNER;
            const repo = process.env.SOURCE_REPO;
            const headSha = process.env.SOURCE_HEAD_SHA;
            const externalId = process.env.PROCESSING_CHECK_EXTERNAL_ID;
            const name = process.env.PROCESSING_CHECK_NAME;
            const selectedLinters = JSON.parse(process.env.SELECTED_LINTERS_JSON || "[]");
            const detailsUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const selectedSummary =
              selectedLinters.length === 0
                ? "No linters were selected."
                : `Running linters: ${selectedLinters.join(", ")}. Detailed results will be posted as a pull request comment.`;
            const output = {
              title: `${name} is running`,
              summary: selectedSummary,
            };
            const checkRuns = await github.paginate(
              github.rest.checks.listForRef,
              {
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              },
              (response) => response.data.check_runs,
            );
            const existing = checkRuns.find(
              (checkRun) => checkRun && checkRun.external_id === externalId,
            );

            if (existing) {
              await github.rest.checks.update({
                owner,
                repo,
                check_run_id: existing.id,
                details_url: detailsUrl,
                external_id: externalId,
                output,
                status: "in_progress",
              });
              return;
            }

            await github.rest.checks.create({
              owner,
              repo,
              name,
              head_sha: headSha,
              status: "in_progress",
              details_url: detailsUrl,
              external_id: externalId,
              started_at: new Date().toISOString(),
              output,
            });

  actionlint:
    needs:
      - detect-targets
      - notify-processing-started
    if: ${{ needs.detect-targets.outputs.actionlint-selected == 'true' }}
    uses: ./.github/workflows/lint-actionlint.yml
    secrets:
      CHECKER_APP_ID: ${{ secrets.CHECKER_APP_ID }}
      CHECKER_PRIVATE_KEY: ${{ secrets.CHECKER_PRIVATE_KEY }}

  yamllint:
    needs:
      - detect-targets
      - notify-processing-started
    if: ${{ needs.detect-targets.outputs.yamllint-selected == 'true' }}
    uses: ./.github/workflows/lint-yamllint.yml
    secrets:
      CHECKER_APP_ID: ${{ secrets.CHECKER_APP_ID }}
      CHECKER_PRIVATE_KEY: ${{ secrets.CHECKER_PRIVATE_KEY }}

  zizmor:
    needs:
      - detect-targets
      - notify-processing-started
    if: ${{ needs.detect-targets.outputs.zizmor-selected == 'true' }}
    uses: ./.github/workflows/lint-zizmor.yml
    secrets:
      CHECKER_APP_ID: ${{ secrets.CHECKER_APP_ID }}
      CHECKER_PRIVATE_KEY: ${{ secrets.CHECKER_PRIVATE_KEY }}

  publish-results:
    needs:
      - detect-targets
      - notify-processing-started
      - actionlint
      - yamllint
      - zizmor
    if: ${{ always() && needs.detect-targets.outputs.selected-linters-json != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download dispatch context artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: detect-targets-context
          path: ${{ runner.temp }}/detect-targets-context

      - name: Mask repository metadata
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          context = json.loads(Path(os.environ["CONTEXT_PATH"]).read_text(encoding="utf-8"))
          decoded = {
              "pr_owner": context["pr_owner"],
              "pr_repo": context["pr_repo"],
              "source_head_sha": context["source_head_sha"],
              "source_owner": context["source_owner"],
              "source_repo": context["source_repo"],
          }

          for key in ("pr_owner", "pr_repo", "source_head_sha", "source_owner", "source_repo"):
              if decoded[key]:
                  print(f"::add-mask::{decoded[key]}")

          if decoded["pr_owner"] and decoded["pr_repo"]:
              print(f"::add-mask::{decoded['pr_owner']}/{decoded['pr_repo']}")
          if decoded["source_owner"] and decoded["source_repo"]:
              print(f"::add-mask::{decoded['source_owner']}/{decoded['source_repo']}")
          PY

      - name: Decode repository context
        id: decode_repository_context
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          context = json.loads(Path(os.environ["CONTEXT_PATH"]).read_text(encoding="utf-8"))
          pr_owner = context["pr_owner"]
          pr_repo = context["pr_repo"]
          source_owner = context["source_owner"]
          source_repo = context["source_repo"]
          values = {
              "pr-owner": pr_owner,
              "pr-repo": pr_repo,
              "processing-check-external-id": context["processing_check_external_id"],
              "processing-check-name": context["processing_check_name"],
              "source-head-sha": context["source_head_sha"],
              "source-owner": source_owner,
              "source-repo": source_repo,
          }

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              for key, value in values.items():
                  fh.write(f"{key}={value}\n")
          PY

      - name: Get PR repository checker token
        id: get_pr_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ steps.decode_repository_context.outputs.pr-owner }}
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ steps.decode_repository_context.outputs.pr-repo }}

      - name: Get source repository checker token
        id: get_source_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ steps.decode_repository_context.outputs.source-owner }}
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ steps.decode_repository_context.outputs.source-repo }}

      - name: Prepare combined report
        id: prepare_report
        env:
          ACTIONLINT_COMMENT_BODY_BASE64: ${{ needs.actionlint.outputs.comment_body_base64 }}
          ACTIONLINT_CONCLUSION: ${{ needs.actionlint.outputs.conclusion }}
          ACTIONLINT_JOB_RESULT: ${{ needs.actionlint.result }}
          SELECTED_LINTERS_JSON: ${{ needs.detect-targets.outputs.selected-linters-json }}
          YAMLLINT_COMMENT_BODY_BASE64: ${{ needs.yamllint.outputs.comment_body_base64 }}
          YAMLLINT_CONCLUSION: ${{ needs.yamllint.outputs.conclusion }}
          YAMLLINT_JOB_RESULT: ${{ needs.yamllint.result }}
          ZIZMOR_COMMENT_BODY_BASE64: ${{ needs.zizmor.outputs.comment_body_base64 }}
          ZIZMOR_CONCLUSION: ${{ needs.zizmor.outputs.conclusion }}
          ZIZMOR_JOB_RESULT: ${{ needs.zizmor.result }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          selected_linters = json.loads(os.environ["SELECTED_LINTERS_JSON"])
          runner_temp = Path(os.environ["RUNNER_TEMP"])
          comment_path = runner_temp / "combined-linter-comment.md"
          env_map = {
              "actionlint": {
                  "comment_body_base64": os.environ.get("ACTIONLINT_COMMENT_BODY_BASE64", ""),
                  "conclusion": os.environ.get("ACTIONLINT_CONCLUSION", ""),
                  "job_result": os.environ.get("ACTIONLINT_JOB_RESULT", ""),
              },
              "yamllint": {
                  "comment_body_base64": os.environ.get("YAMLLINT_COMMENT_BODY_BASE64", ""),
                  "conclusion": os.environ.get("YAMLLINT_CONCLUSION", ""),
                  "job_result": os.environ.get("YAMLLINT_JOB_RESULT", ""),
              },
              "zizmor": {
                  "comment_body_base64": os.environ.get("ZIZMOR_COMMENT_BODY_BASE64", ""),
                  "conclusion": os.environ.get("ZIZMOR_CONCLUSION", ""),
                  "job_result": os.environ.get("ZIZMOR_JOB_RESULT", ""),
              },
          }

          sections = []
          passed = 0
          failed = 0

          for linter_name in selected_linters:
              linter_env = env_map.get(linter_name, {})
              encoded_body = linter_env.get("comment_body_base64", "")
              job_result = linter_env.get("job_result", "")
              conclusion = linter_env.get("conclusion", "")

              if encoded_body:
                  section = base64.b64decode(encoded_body).decode("utf-8").strip()
              else:
                  section = ""

              if job_result == "failure" and not section:
                  section = (
                      f"### {linter_name}\n\n"
                      f"❌ The `{linter_name}` workflow failed before producing a detailed report. See the workflow logs."
                  )
              elif job_result == "cancelled" and not section:
                  section = (
                      f"### {linter_name}\n\n"
                      f"❌ The `{linter_name}` workflow was cancelled before producing a detailed report."
                  )

              is_success = job_result not in {"failure", "cancelled"} and conclusion == "success"

              if is_success:
                  passed += 1
              else:
                  failed += 1

              if section:
                  sections.append(section)

          total = len(selected_linters)
          overall_conclusion = "success" if failed == 0 else "failure"

          if overall_conclusion == "success":
              overall_summary = f"All {total} selected linter(s) completed successfully."
          else:
              overall_summary = f"{failed} of {total} selected linter(s) reported issues or failed."

          lines = [
              "<!-- linter-service:results -->",
              "## linter-service",
              "",
              overall_summary,
              "",
          ]

          for index, section in enumerate(sections):
              lines.append(section)
              if index != len(sections) - 1:
                  lines.append("")

          comment_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              fh.write(f"overall_conclusion={overall_conclusion}\n")
              fh.write(f"overall_summary={overall_summary}\n")
          PY

      - name: Upsert combined PR comment
        if: ${{ always() }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          COMMENT_FILE: ${{ runner.temp }}/combined-linter-comment.md
          COMMENT_MARKER: '<!-- linter-service:results -->'
          PR_NUMBER: ${{ needs.detect-targets.outputs.pull-request-number }}
          PR_OWNER: ${{ steps.decode_repository_context.outputs.pr-owner }}
          PR_REPO: ${{ steps.decode_repository_context.outputs.pr-repo }}
        with:
          github-token: ${{ steps.get_pr_token.outputs.token }}
          script: |
            const fs = require("node:fs");

            const body = fs.existsSync(process.env.COMMENT_FILE)
              ? fs.readFileSync(process.env.COMMENT_FILE, "utf8")
              : [
                  process.env.COMMENT_MARKER,
                  "## linter-service",
                  "",
                  "❌ The linter-service workflow failed to generate a combined report. See the workflow logs.",
                  "",
                ].join("\n");
            const marker = process.env.COMMENT_MARKER;
            const owner = process.env.PR_OWNER;
            const repo = process.env.PR_REPO;
            const issueNumber = Number(process.env.PR_NUMBER);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body,
            });

      - name: Finalize processing check run
        if: ${{ always() }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          OVERALL_CONCLUSION: ${{ steps.prepare_report.outcome == 'success' && steps.prepare_report.outputs.overall_conclusion || 'failure' }}
          OVERALL_SUMMARY: ${{ steps.prepare_report.outcome == 'success' && steps.prepare_report.outputs.overall_summary || 'The linter-service workflow failed to generate a combined report.' }}
          PROCESSING_CHECK_EXTERNAL_ID: ${{ steps.decode_repository_context.outputs.processing-check-external-id }}
          PROCESSING_CHECK_NAME: ${{ steps.decode_repository_context.outputs.processing-check-name }}
          SOURCE_HEAD_SHA: ${{ steps.decode_repository_context.outputs.source-head-sha }}
          SOURCE_OWNER: ${{ steps.decode_repository_context.outputs.source-owner }}
          SOURCE_REPO: ${{ steps.decode_repository_context.outputs.source-repo }}
        with:
          github-token: ${{ steps.get_source_token.outputs.token }}
          script: |
            const owner = process.env.SOURCE_OWNER;
            const repo = process.env.SOURCE_REPO;
            const headSha = process.env.SOURCE_HEAD_SHA;
            const externalId = process.env.PROCESSING_CHECK_EXTERNAL_ID;
            const name = process.env.PROCESSING_CHECK_NAME;
            const overallConclusion = process.env.OVERALL_CONCLUSION;
            const overallSummary = process.env.OVERALL_SUMMARY;
            const detailsUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const output = {
              title: overallConclusion === "success" ? `${name} completed` : `${name} found issues`,
              summary: overallSummary,
            };
            const checkRuns = await github.paginate(
              github.rest.checks.listForRef,
              {
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              },
              (response) => response.data.check_runs,
            );
            const existing = checkRuns.find(
              (checkRun) => checkRun && checkRun.external_id === externalId,
            );

            if (existing) {
              await github.rest.checks.update({
                owner,
                repo,
                check_run_id: existing.id,
                conclusion: overallConclusion,
                completed_at: new Date().toISOString(),
                details_url: detailsUrl,
                external_id: externalId,
                output,
                status: "completed",
              });
              return;
            }

            await github.rest.checks.create({
              owner,
              repo,
              name,
              head_sha: headSha,
              status: "completed",
              conclusion: overallConclusion,
              details_url: detailsUrl,
              external_id: externalId,
              started_at: new Date().toISOString(),
              completed_at: new Date().toISOString(),
              output,
            });

      - name: Fail workflow when lint reports issues
        if: ${{ steps.prepare_report.outputs.overall_conclusion != 'success' }}
        run: |
          echo "One or more linters reported issues." >&2
          exit 1

  no-linters-needed:
    needs: detect-targets
    if: ${{ needs.detect-targets.outputs.selected-linters-json == '[]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped lint execution
        env:
          SKIP_REASON: ${{ needs.detect-targets.outputs.skip-reason }}
        run: |
          if [ -n "$SKIP_REASON" ]; then
            echo "$SKIP_REASON"
          else
            echo "No configured linters matched the pull request changes."
          fi

name: Repository Dispatch
on:
  pull_request:
    types:
      - edited
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - '**'
  repository_dispatch:
    types:
      - github_app_webhook
concurrency:
  group: ${{ format('repository-dispatch-{0}-{1}', github.event_name == 'repository_dispatch' && github.event.client_payload.repository.full_name || github.repository, github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.event_name == 'push' && format('push-{0}', github.ref) || github.event.client_payload.event_name == 'pull_request' && format('pr-{0}', github.event.client_payload.pull_request.number) || github.event.client_payload.event_name == 'push' && format('push-{0}', github.event.client_payload.push.ref) || github.run_id) }}
  cancel-in-progress: false
permissions: {}
jobs:
  detect-targets:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      pull-request-number: ${{ steps.collect.outputs.pull-request-number }}
      selected-linter-jobs-json: ${{ steps.collect.outputs.selected-linter-jobs-json }}
      selected-linters-json: ${{ steps.collect.outputs.selected-linters-json }}
      skip-reason: ${{ steps.collect.outputs.skip-reason }}
    env:
      PULL_REQUEST_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event_name == 'repository_dispatch' && github.event.client_payload.pull_request.number || '' }}
      ROUTED_EVENT_NAME: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.event_name || github.event_name }}
      SOURCE_DEFAULT_BRANCH: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.repository.default_branch || github.event.repository.default_branch }}
      SOURCE_HEAD_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.event_name == 'push' && github.ref_name || github.event_name == 'repository_dispatch' && github.event.client_payload.event_name == 'push' && github.event.client_payload.push.ref_name || github.event.client_payload.pull_request.head.ref || '' }}
      SOURCE_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event_name == 'push' && github.sha || github.event_name == 'repository_dispatch' && github.event.client_payload.event_name == 'push' && github.event.client_payload.push.after || github.event.client_payload.pull_request.head.sha || '' }}
      SOURCE_REPOSITORY_NAME: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.name || github.event_name == 'repository_dispatch' && github.event.client_payload.event_name == 'pull_request' && github.event.client_payload.pull_request.head.repo.name || github.event_name == 'repository_dispatch' && github.event.client_payload.repository.name || github.event.repository.name }}
      SOURCE_REPOSITORY_OWNER: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.owner.login || github.event_name == 'repository_dispatch' && github.event.client_payload.event_name == 'pull_request' && github.event.client_payload.pull_request.head.repo.owner.login || github.event_name == 'repository_dispatch' && github.event.client_payload.repository.owner.login || github.event.repository.owner.login }}
      SOURCE_REPOSITORY_PATH: ${{ github.workspace }}/source-routing-repo
      TARGET_REPOSITORY_NAME: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.repository.name || github.event.repository.name }}
      TARGET_REPOSITORY_OWNER: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.repository.owner.login || github.event.repository.owner.login }}
    steps:
      - name: Validate routed event metadata
        run: |
          test -n "$TARGET_REPOSITORY_OWNER" || {
            echo "TARGET_REPOSITORY_OWNER is required" >&2
            exit 1
          }
          test -n "$TARGET_REPOSITORY_NAME" || {
            echo "TARGET_REPOSITORY_NAME is required" >&2
            exit 1
          }
          case "$ROUTED_EVENT_NAME" in
            pull_request)
              case "$PULL_REQUEST_NUMBER" in
                ''|*[!0-9]*)
                  echo "PULL_REQUEST_NUMBER must be a positive integer" >&2
                  exit 1
                  ;;
              esac
              test "$PULL_REQUEST_NUMBER" -gt 0 || {
                echo "PULL_REQUEST_NUMBER must be a positive integer" >&2
                exit 1
              }
              ;;
            push)
              test -n "$SOURCE_HEAD_REF" || {
                echo "SOURCE_HEAD_REF is required for push events" >&2
                exit 1
              }
              test -n "$SOURCE_HEAD_SHA" || {
                echo "SOURCE_HEAD_SHA is required for push events" >&2
                exit 1
              }
              ;;
            *)
              echo "Unsupported routed event: $ROUTED_EVENT_NAME" >&2
              exit 1
              ;;
          esac
      - name: Mask repository metadata
        run: |
          echo "::add-mask::$TARGET_REPOSITORY_OWNER"
          echo "::add-mask::$TARGET_REPOSITORY_NAME"
          echo "::add-mask::$TARGET_REPOSITORY_OWNER/$TARGET_REPOSITORY_NAME"
          if [ -n "$SOURCE_HEAD_SHA" ]; then
            echo "::add-mask::$SOURCE_HEAD_SHA"
          fi
      - name: Check out linter-service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: linter-service
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Build linter definitions
        id: build_linter_definitions
        env:
          LINTER_CONFIG_PATH: ${{ github.workspace }}/linter-service/linters.json
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          config_path = Path(os.environ["LINTER_CONFIG_PATH"])
          config_data = json.loads(config_path.read_text(encoding="utf-8"))
          linters = config_data.get("linters", [])
          script_root = Path(os.environ["LINTER_SERVICE_PATH"])
          definitions = []

          if not isinstance(linters, list):
              raise SystemExit("linter config must include a linters array")

          for item in linters:
              if not isinstance(item, dict) or not isinstance(item.get("name"), str):
                  raise SystemExit("each linter config entry must include a name")

              linter_name = item["name"]
              script_path = script_root / linter_name / "patterns.sh"
              result = subprocess.run(
                  ["bash", str(script_path)],
                  capture_output=True,
                  check=True,
                  text=True,
              )
              patterns = [line.strip() for line in result.stdout.splitlines() if line.strip()]
              definition = {"name": linter_name, "patterns": patterns}
              execution_group = item.get("execution_group")
              if isinstance(execution_group, str) and execution_group:
                  definition["execution_group"] = execution_group
              isolated = item.get("isolated")
              if isolated is not None:
                  if not isinstance(isolated, bool):
                      raise SystemExit(f"{linter_name}.isolated must be a boolean")
                  definition["isolated"] = isolated
              default_disabled = item.get("default_disabled")
              if default_disabled is not None:
                  if not isinstance(default_disabled, bool):
                      raise SystemExit(f"{linter_name}.default_disabled must be a boolean")
                  definition["default_disabled"] = default_disabled
              config_script_path = script_root / linter_name / "config_trigger_patterns.sh"
              if config_script_path.is_file():
                  config_result = subprocess.run(
                      ["bash", str(config_script_path)],
                      capture_output=True,
                      check=True,
                      text=True,
                  )
                  config_trigger_patterns = [
                      line.strip()
                      for line in config_result.stdout.splitlines()
                      if line.strip()
                  ]
                  if config_trigger_patterns:
                      definition["config_trigger_patterns"] = config_trigger_patterns
              required_root_files = item.get("required_root_files")
              if required_root_files is not None:
                  if not isinstance(required_root_files, list) or not all(
                      isinstance(entry, str) and entry.strip()
                      for entry in required_root_files
                  ):
                      raise SystemExit(
                          f"{linter_name}.required_root_files must be an array of non-empty strings"
                      )
                  definition["required_root_files"] = required_root_files
              definitions.append(definition)

          output_path = Path(os.environ["RUNNER_TEMP"]) / "linter-definitions.json"
          output_path.write_text(json.dumps(definitions), encoding="utf-8")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"path={output_path}\n")
          PY
      - name: Get checker token
        id: get_checker_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ env.TARGET_REPOSITORY_OWNER }}
          permission-contents: read
          permission-pull-requests: read
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ env.TARGET_REPOSITORY_NAME }}
      - name: Get source repository config token
        id: get_source_config_token
        continue-on-error: true
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ env.SOURCE_REPOSITORY_OWNER }}
          permission-contents: read
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ env.SOURCE_REPOSITORY_NAME }}
      - name: Check out source repository for lint targeting
        if: ${{ steps.get_source_config_token.outcome == 'success' && env.SOURCE_HEAD_SHA != '' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: source-routing-repo
          persist-credentials: false
          ref: ${{ env.SOURCE_HEAD_SHA }}
          repository: ${{ env.SOURCE_REPOSITORY_OWNER }}/${{ env.SOURCE_REPOSITORY_NAME }}
          token: ${{ steps.get_source_config_token.outputs.token }}
      - name: Collect lint targets context
        id: collect
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          LINTER_DEFINITIONS_PATH: ${{ steps.build_linter_definitions.outputs.path }}
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
          PULL_REQUEST_NUMBER: ${{ env.PULL_REQUEST_NUMBER }}
          ROUTED_EVENT_NAME: ${{ env.ROUTED_EVENT_NAME }}
          SOURCE_DEFAULT_BRANCH: ${{ env.SOURCE_DEFAULT_BRANCH }}
          SOURCE_HEAD_REF: ${{ env.SOURCE_HEAD_REF }}
          SOURCE_HEAD_SHA: ${{ env.SOURCE_HEAD_SHA }}
          SOURCE_REPOSITORY_PATH: ${{ env.SOURCE_REPOSITORY_PATH }}
          TARGET_REPOSITORY_NAME: ${{ env.TARGET_REPOSITORY_NAME }}
          TARGET_REPOSITORY_OWNER: ${{ env.TARGET_REPOSITORY_OWNER }}
        with:
          github-token: ${{ steps.get_checker_token.outputs.token }}
          script: |
            const childProcess = require("node:child_process");
            const fs = require("node:fs");
            const path = require("node:path");
            const {
              loadLinterServiceConfig,
            } = require(path.join(
              process.env.LINTER_SERVICE_PATH,
              ".github/scripts/linter-service-config.js",
            ));
            const {
              buildLinterJobAssignments,
              selectLinters,
              validateDefinition,
            } = require(path.join(
              process.env.LINTER_SERVICE_PATH,
              ".github/scripts/linter-targeting.js",
            ));
            const owner = process.env.TARGET_REPOSITORY_OWNER;
            const repo = process.env.TARGET_REPOSITORY_NAME;
            const routedEventName = process.env.ROUTED_EVENT_NAME;
            const pullNumberText = process.env.PULL_REQUEST_NUMBER || "";
            const pullNumber = pullNumberText ? Number(pullNumberText) : null;
            const sourceDefaultBranch = process.env.SOURCE_DEFAULT_BRANCH || "";
            const sourceHeadRefFromPayload = process.env.SOURCE_HEAD_REF || "";
            const sourceHeadShaFromPayload = process.env.SOURCE_HEAD_SHA || "";
            const sourceRepositoryPath = process.env.SOURCE_REPOSITORY_PATH || "";
            const definitions = JSON.parse(
              fs.readFileSync(process.env.LINTER_DEFINITIONS_PATH, "utf8"),
            );
            const contextPath = path.join(
              process.env.RUNNER_TEMP,
              "detect-targets-context.json",
            );
            const writeContext = (contextValues) => {
              fs.writeFileSync(
                contextPath,
                JSON.stringify(contextValues),
                "utf8",
              );
              core.setOutput("context-path", contextPath);
            };
            const finalizeOutputs = ({
              pullRequestNumber = pullNumberText,
              selectedLinterJobs,
              selectedLinters,
              skipReason,
            }) => {
              core.setOutput("pull-request-number", pullRequestNumber);
              core.setOutput(
                "selected-linter-jobs-json",
                JSON.stringify(selectedLinterJobs),
              );
              core.setOutput("selected-linters-json", JSON.stringify(selectedLinters));
              core.setOutput("skip-reason", skipReason);
            };
            const defaultServiceConfig = {
              exists: false,
              global: {
                exclude_paths: [],
              },
              linters: {},
            };
            const loadSourceServiceConfig = () => {
              if (!sourceRepositoryPath || !fs.existsSync(sourceRepositoryPath)) {
                core.warning(
                  "source repository checkout was unavailable during target detection; falling back to default linter-service config",
                );
                return defaultServiceConfig;
              }

              return loadLinterServiceConfig({
                repositoryPath: sourceRepositoryPath,
              });
            };
            const writeSkipContext = ({
              commentEnabled,
              pullRequestNumber = pullNumberText,
              skipReason,
              sourceHeadRef = sourceHeadRefFromPayload,
              sourceHeadSha = sourceHeadShaFromPayload,
              sourceOwner = owner,
              sourceRepo = repo,
            }) => {
              writeContext({
                changed_files: [],
                comment_enabled: commentEnabled,
                event_name: routedEventName,
                pr_owner: owner,
                pr_repo: repo,
                processing_check_external_id: "",
                processing_check_name: "linter-service",
                selected_linters: [],
                skip_reason: skipReason,
                source_head_ref: sourceHeadRef,
                source_head_sha: sourceHeadSha,
                source_owner: sourceOwner,
                source_repo: sourceRepo,
              });
              finalizeOutputs({
                pullRequestNumber,
                selectedLinterJobs: [],
                selectedLinters: [],
                skipReason,
              });
            };
            const isSelfRepositoryDispatch =
              context.eventName === "repository_dispatch" &&
              owner.toLowerCase() === context.repo.owner.toLowerCase() &&
              repo.toLowerCase() === context.repo.repo.toLowerCase();
            const isNonRoutingPullRequestEdit =
              context.eventName === "pull_request" &&
              context.payload.action === "edited" &&
              typeof context.payload.changes?.base?.ref?.from !== "string";

            if (!Array.isArray(definitions)) {
              throw new Error("LINTER_DEFINITIONS_PATH must resolve to a JSON array");
            }

            for (const definition of definitions) {
              validateDefinition(definition);
            }

            const serviceConfig = loadSourceServiceConfig();

            if (isNonRoutingPullRequestEdit) {
              const skipReason =
                "Skipping pull_request edited event because it did not change the base branch.";

              writeSkipContext({
                commentEnabled: "true",
                skipReason,
              });
              return;
            }

            if (isSelfRepositoryDispatch) {
              const skipReason =
                "Skipping repository_dispatch for this repository because local events are handled by direct workflow triggers.";

              writeSkipContext({
                commentEnabled: routedEventName === "pull_request" ? "true" : "false",
                skipReason,
              });
              return;
            }

            if (routedEventName === "pull_request") {
              if (!Number.isInteger(pullNumber) || pullNumber < 1) {
                throw new Error("pull request number is required");
              }

              const pull = (
                await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: pullNumber,
                })
              ).data;

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });

              const currentFiles = files
                .filter((file) => file.status !== "removed")
                .map((file) => file.filename);

              const sourceOwner = pull.head.repo?.owner?.login ?? owner;
              const sourceHeadRef = pull.head.ref ?? sourceHeadRefFromPayload;
              const sourceRepo = pull.head.repo?.name ?? repo;
              const sourceHeadSha = sourceHeadShaFromPayload || pull.head.sha;

              if (!sourceHeadSha) {
                throw new Error("pull request head SHA is required");
              }

              const selectedLinters = selectLinters({
                candidatePaths: currentFiles,
                definitions,
                repositoryPath: sourceRepositoryPath,
                serviceConfig,
              });
              const selectedLinterJobs = buildLinterJobAssignments({
                definitions,
                selectedLinters,
              });

              writeContext({
                changed_files: currentFiles,
                comment_enabled: "true",
                event_name: routedEventName,
                pr_owner: owner,
                pr_repo: repo,
                processing_check_external_id: `linter-service:${pullNumber}:${sourceHeadSha}`,
                processing_check_name: "linter-service",
                selected_linters: selectedLinters,
                skip_reason: "",
                source_head_ref: sourceHeadRef,
                source_head_sha: sourceHeadSha,
                source_owner: sourceOwner,
                source_repo: sourceRepo,
              });
              finalizeOutputs({
                pullRequestNumber: String(pullNumber),
                selectedLinterJobs,
                selectedLinters,
                skipReason: "",
              });
              return;
            }

            if (routedEventName === "push") {
              const sourceHeadRef = sourceHeadRefFromPayload || sourceDefaultBranch;
              const sourceHeadSha = sourceHeadShaFromPayload;

              if (!sourceHeadRef) {
                throw new Error("push ref is required");
              }

              if (!sourceHeadSha) {
                throw new Error("push head SHA is required");
              }

              if (sourceDefaultBranch && sourceHeadRef !== sourceDefaultBranch) {
                writeSkipContext({
                  commentEnabled: "false",
                  pullRequestNumber: "",
                  skipReason: `Skipping push event because ${sourceHeadRef} is not the default branch ${sourceDefaultBranch}.`,
                  sourceHeadRef,
                  sourceHeadSha,
                });
                return;
              }

              const currentFiles = childProcess
                .execFileSync("git", ["ls-files"], {
                  cwd: process.env.SOURCE_REPOSITORY_PATH,
                  encoding: "utf8",
                })
                .split(/\r?\n/u)
                .filter(Boolean);
              const selectedLinters = selectLinters({
                candidatePaths: currentFiles,
                definitions,
                repositoryPath: sourceRepositoryPath,
                serviceConfig,
              });
              const selectedLinterJobs = buildLinterJobAssignments({
                definitions,
                selectedLinters,
              });

              writeContext({
                changed_files: currentFiles,
                comment_enabled: "false",
                event_name: routedEventName,
                pr_owner: owner,
                pr_repo: repo,
                processing_check_external_id: `linter-service:push:${sourceHeadRef}:${sourceHeadSha}`,
                processing_check_name: "linter-service",
                selected_linters: selectedLinters,
                skip_reason: "",
                source_head_ref: sourceHeadRef,
                source_head_sha: sourceHeadSha,
                source_owner: owner,
                source_repo: repo,
              });
              finalizeOutputs({
                pullRequestNumber: "",
                selectedLinterJobs,
                selectedLinters,
                skipReason: "",
              });
              return;
            }

            throw new Error(`Unsupported routed event: ${routedEventName}`);
      - name: Report routing status
        env:
          SELECTED_LINTER_JOBS_JSON: ${{ steps.collect.outputs.selected-linter-jobs-json }}
          ROUTED_EVENT_NAME: ${{ env.ROUTED_EVENT_NAME }}
          SELECTED_LINTERS_JSON: ${{ steps.collect.outputs.selected-linters-json }}
        run: |
          echo "Routing targets resolved."
          echo "Routed event: ${ROUTED_EVENT_NAME}"
          echo "Selected linters: ${SELECTED_LINTERS_JSON}"
          echo "Selected linter jobs: ${SELECTED_LINTER_JOBS_JSON}"
      - name: Report skipped lint execution
        if: ${{ steps.collect.outputs.selected-linters-json == '[]' }}
        env:
          SKIP_REASON: ${{ steps.collect.outputs.skip-reason }}
        run: |
          if [ -n "$SKIP_REASON" ]; then
            echo "$SKIP_REASON"
          else
            echo "No configured linters matched the selected target files."
          fi
      - name: Mask source repository context
        if: ${{ steps.collect.outputs.skip-reason == '' && steps.collect.outputs.selected-linters-json != '[]' }}
        env:
          CONTEXT_PATH: ${{ steps.collect.outputs.context-path }}
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          python3 "$LINTER_SERVICE_PATH/.github/scripts/context-artifact.py" \
            mask \
            "$CONTEXT_PATH" \
            source_owner \
            source_repo \
            source_head_sha
      - name: Decode source repository context
        if: ${{ steps.collect.outputs.skip-reason == '' && steps.collect.outputs.selected-linters-json != '[]' }}
        id: decode_source_context
        env:
          CONTEXT_PATH: ${{ steps.collect.outputs.context-path }}
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          python3 "$LINTER_SERVICE_PATH/.github/scripts/context-artifact.py" \
            outputs \
            "$CONTEXT_PATH" \
            comment_enabled=comment-enabled \
            processing_check_external_id=processing-check-external-id \
            processing_check_name=processing-check-name \
            source_head_sha=source-head-sha \
            source_owner=source-owner \
            source_repo=source-repo
      - name: Derive artifact passphrase
        if: ${{ steps.collect.outputs.skip-reason == '' }}
        env:
          CHECKER_PRIVATE_KEY: ${{ secrets.CHECKER_PRIVATE_KEY }}
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          passphrase="$(bash "$LINTER_SERVICE_PATH/.github/scripts/artifact-passphrase.sh")"
          echo "::add-mask::$passphrase"
          echo "ARTIFACT_PASSPHRASE=$passphrase" >> "$GITHUB_ENV"
      - name: Encrypt dispatch context artifact
        if: ${{ steps.collect.outputs.skip-reason == '' }}
        env:
          CONTEXT_PATH: ${{ steps.collect.outputs.context-path }}
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          encrypted_path="$RUNNER_TEMP/detect-targets-context.json.enc"
          bash "$LINTER_SERVICE_PATH/.github/scripts/secure-artifact.sh" \
            encrypt \
            "$CONTEXT_PATH" \
            "$encrypted_path"
          rm -f "$CONTEXT_PATH"
      - name: Upload dispatch context artifact
        if: ${{ steps.collect.outputs.skip-reason == '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: detect-targets-context
          path: ${{ runner.temp }}/detect-targets-context.json.enc
          if-no-files-found: error
          retention-days: 1
      - name: Get source repository checker token
        if: ${{ steps.collect.outputs.skip-reason == '' && steps.collect.outputs.selected-linters-json != '[]' }}
        id: get_source_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ steps.decode_source_context.outputs.source-owner }}
          permission-checks: write
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ steps.decode_source_context.outputs.source-repo }}
      - name: Notify processing start
        if: ${{ steps.collect.outputs.skip-reason == '' && steps.collect.outputs.selected-linters-json != '[]' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          CHECK_RUN_EXTERNAL_ID: ${{ steps.decode_source_context.outputs.processing-check-external-id }}
          CHECK_RUN_HEAD_SHA: ${{ steps.decode_source_context.outputs.source-head-sha }}
          CHECK_RUN_NAME: ${{ steps.decode_source_context.outputs.processing-check-name }}
          CHECK_RUN_OUTPUT_TITLE: ${{ steps.decode_source_context.outputs.processing-check-name }} is running
          CHECK_RUN_OWNER: ${{ steps.decode_source_context.outputs.source-owner }}
          CHECK_RUN_REPO: ${{ steps.decode_source_context.outputs.source-repo }}
          CHECK_RUN_STATUS: in_progress
          COMMENT_ENABLED: ${{ steps.decode_source_context.outputs.comment-enabled }}
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
          PROCESSING_CHECK_EXTERNAL_ID: ${{ steps.decode_source_context.outputs.processing-check-external-id }}
          PROCESSING_CHECK_NAME: ${{ steps.decode_source_context.outputs.processing-check-name }}
          SELECTED_LINTERS_JSON: ${{ steps.collect.outputs.selected-linters-json }}
          SOURCE_HEAD_SHA: ${{ steps.decode_source_context.outputs.source-head-sha }}
          SOURCE_OWNER: ${{ steps.decode_source_context.outputs.source-owner }}
          SOURCE_REPO: ${{ steps.decode_source_context.outputs.source-repo }}
        with:
          github-token: ${{ steps.get_source_token.outputs.token }}
          script: |
            const selectedLinters = JSON.parse(process.env.SELECTED_LINTERS_JSON || "[]");
            process.env.CHECK_RUN_OUTPUT_SUMMARY =
              selectedLinters.length === 0
                ? "No linters were selected."
                : process.env.COMMENT_ENABLED === "true"
                  ? `Running linters: ${selectedLinters.join(", ")}. Detailed results will be posted as a pull request comment.`
                  : `Running linters: ${selectedLinters.join(", ")}. Detailed results will be published as checks and SARIF for this default-branch commit.`;
            const upsertCheckRun = require(
              `${process.env.LINTER_SERVICE_PATH}/.github/scripts/upsert-check-run.js`,
            );
            await upsertCheckRun({ github, env: process.env });
  run-linters:
    name: ${{ matrix.assignment.name }}
    needs:
      - detect-targets
    if: ${{ needs.detect-targets.outputs.selected-linter-jobs-json != '[]' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        assignment: ${{ fromJSON(needs.detect-targets.outputs.selected-linter-jobs-json) }}
    uses: ./.github/workflows/lint-common.yml
    with:
      artifact-name: ${{ matrix.assignment.artifact_name }}
      linter-names-json: ${{ toJSON(matrix.assignment.linter_names) }}
    secrets:
      CHECKER_APP_ID: ${{ secrets.CHECKER_APP_ID }}
      CHECKER_PRIVATE_KEY: ${{ secrets.CHECKER_PRIVATE_KEY }}
  publish-results:
    needs:
      - detect-targets
      - run-linters
    if: ${{ always() && needs.detect-targets.outputs.skip-reason == '' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download dispatch context artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: detect-targets-context
          path: ${{ runner.temp }}/detect-targets-context
      - name: Check out linter-service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: linter-service
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Derive artifact passphrase
        env:
          CHECKER_PRIVATE_KEY: ${{ secrets.CHECKER_PRIVATE_KEY }}
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          passphrase="$(bash "$LINTER_SERVICE_PATH/.github/scripts/artifact-passphrase.sh")"
          echo "::add-mask::$passphrase"
          echo "ARTIFACT_PASSPHRASE=$passphrase" >> "$GITHUB_ENV"
      - name: Decrypt dispatch context artifact
        env:
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          encrypted_path="$RUNNER_TEMP/detect-targets-context/detect-targets-context.json.enc"
          decrypted_path="$RUNNER_TEMP/detect-targets-context/detect-targets-context.json"
          bash "$LINTER_SERVICE_PATH/.github/scripts/secure-artifact.sh" \
            decrypt \
            "$encrypted_path" \
            "$decrypted_path"
          rm -f "$encrypted_path"
      - name: Download linter summary artifacts
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: linter-summary-*
          merge-multiple: true
          path: ${{ runner.temp }}/linter-summaries
      - name: Download linter SARIF artifacts
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: linter-sarif-*
          merge-multiple: true
          path: ${{ runner.temp }}/linter-sarifs
      - name: Mask repository metadata
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          python3 "$LINTER_SERVICE_PATH/.github/scripts/context-artifact.py" \
            mask \
            "$CONTEXT_PATH" \
            pr_owner \
            pr_repo \
            source_head_sha \
            source_owner \
            source_repo
      - name: Decode repository context
        id: decode_repository_context
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          python3 "$LINTER_SERVICE_PATH/.github/scripts/context-artifact.py" \
            outputs \
            "$CONTEXT_PATH" \
            comment_enabled=comment-enabled \
            event_name=event-name \
            pr_owner=pr-owner \
            pr_repo=pr-repo \
            processing_check_external_id=processing-check-external-id \
            processing_check_name=processing-check-name \
            source_head_ref=source-head-ref \
            source_head_sha=source-head-sha \
            source_owner=source-owner \
            source_repo=source-repo
      - name: Get PR repository checker token
        id: get_pr_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ steps.decode_repository_context.outputs.pr-owner }}
          permission-pull-requests: write
          permission-security-events: write
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ steps.decode_repository_context.outputs.pr-repo }}
      - name: Get source repository checker token
        id: get_source_token
        if: ${{ needs.detect-targets.outputs.selected-linters-json != '[]' }}
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ steps.decode_repository_context.outputs.source-owner }}
          permission-checks: write
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ steps.decode_repository_context.outputs.source-repo }}
      - name: Decrypt linter summary artifacts
        id: decrypt_summaries
        if: ${{ always() }}
        env:
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          shopt -s nullglob
          failures=0
          mkdir -p "$RUNNER_TEMP/linter-summaries-decrypted"
          encrypted_files=("$RUNNER_TEMP"/linter-summaries/*.enc)
          if [ "${#encrypted_files[@]}" -eq 0 ]; then
            exit 0
          fi

          for encrypted_path in "${encrypted_files[@]}"; do
            decrypted_path="$RUNNER_TEMP/linter-summaries-decrypted/$(basename "${encrypted_path%.enc}")"
            if ! bash "$LINTER_SERVICE_PATH/.github/scripts/secure-artifact.sh" \
              decrypt \
              "$encrypted_path" \
              "$decrypted_path"; then
              echo "::warning::Failed to decrypt $(basename "$encrypted_path")"
              failures=1
            fi
          done

          exit "$failures"
      - name: Decrypt linter SARIF artifacts
        id: decrypt_sarifs
        if: ${{ always() }}
        env:
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
        run: |
          shopt -s nullglob
          failures=0
          mkdir -p "$RUNNER_TEMP/linter-sarifs-decrypted"
          encrypted_files=("$RUNNER_TEMP"/linter-sarifs/*.enc)
          if [ "${#encrypted_files[@]}" -eq 0 ]; then
            exit 0
          fi

          for encrypted_path in "${encrypted_files[@]}"; do
            decrypted_path="$RUNNER_TEMP/linter-sarifs-decrypted/$(basename "${encrypted_path%.enc}")"
            if ! bash "$LINTER_SERVICE_PATH/.github/scripts/secure-artifact.sh" \
              decrypt \
              "$encrypted_path" \
              "$decrypted_path"; then
              echo "::warning::Failed to decrypt $(basename "$encrypted_path")"
              failures=1
            fi
          done

          exit "$failures"
      - name: Prepare deselected SARIF placeholders
        if: ${{ always() }}
        env:
          LINTER_CONFIG_PATH: ${{ github.workspace }}/linter-service/linters.json
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
          OUTPUT_ROOT: ${{ runner.temp }}/linter-sarifs-decrypted
          SELECTED_LINTERS_JSON: ${{ needs.detect-targets.outputs.selected-linters-json }}
        run: |
          node "$LINTER_SERVICE_PATH/.github/scripts/prepare-deselected-sarif.js"
      - name: Aggregate SARIF artifacts
        if: ${{ always() }}
        env:
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
          SARIF_INPUT_ROOT: ${{ runner.temp }}/linter-sarifs-decrypted
          SARIF_OUTPUT_PATH: ${{ runner.temp }}/linter-sarif-upload/linter-service.sarif
        run: |
          node "$LINTER_SERVICE_PATH/.github/scripts/aggregate-sarif.js"
      - name: Prepare combined report
        id: prepare_report
        if: ${{ always() && needs.detect-targets.outputs.selected-linters-json != '[]' }}
        env:
          DECRYPT_SUMMARIES_OUTCOME: ${{ steps.decrypt_summaries.outcome }}
          LINTER_SUMMARY_PATH: ${{ runner.temp }}/linter-summaries-decrypted
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
          RUNNER_TEMP: ${{ runner.temp }}
          SELECTED_LINTERS_JSON: ${{ needs.detect-targets.outputs.selected-linters-json }}
        run: |
          node "$LINTER_SERVICE_PATH/.github/scripts/render-combined-report.js"
      - name: Upsert combined PR comment
        if: ${{ always() && needs.detect-targets.outputs.selected-linters-json != '[]' && steps.decode_repository_context.outputs.comment-enabled == 'true' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          COMMENT_FILE: ${{ runner.temp }}/combined-linter-comment.md
          COMMENT_MARKER: '<!-- linter-service:results -->'
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
          PR_NUMBER: ${{ needs.detect-targets.outputs.pull-request-number }}
          PR_OWNER: ${{ steps.decode_repository_context.outputs.pr-owner }}
          PR_REPO: ${{ steps.decode_repository_context.outputs.pr-repo }}
        with:
          github-token: ${{ steps.get_pr_token.outputs.token }}
          script: |
            const upsertPullRequestComment = require(
              `${process.env.LINTER_SERVICE_PATH}/.github/scripts/upsert-pr-comment.js`,
            );
            await upsertPullRequestComment({ github, env: process.env });
      - name: Upload SARIF artifacts
        id: upload_sarif
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
          SARIF_HEAD_SHA: ${{ steps.decode_repository_context.outputs.source-head-sha }}
          SARIF_OWNER: ${{ steps.decode_repository_context.outputs.pr-owner }}
          SARIF_PR_NUMBER: ${{ steps.decode_repository_context.outputs.comment-enabled == 'true' && needs.detect-targets.outputs.pull-request-number || '' }}
          SARIF_REF: ${{ steps.decode_repository_context.outputs.source-head-ref }}
          SARIF_REPO: ${{ steps.decode_repository_context.outputs.pr-repo }}
          SARIF_ROOT: ${{ runner.temp }}/linter-sarif-upload
        with:
          github-token: ${{ steps.get_pr_token.outputs.token }}
          script: |
            const uploadSarif = require(
              `${process.env.LINTER_SERVICE_PATH}/.github/scripts/upload-sarif.js`,
            );
            await uploadSarif({ github, env: process.env });
      - name: Prepare final processing summary
        id: prepare_final_summary
        if: ${{ always() && needs.detect-targets.outputs.selected-linters-json != '[]' }}
        env:
          OVERALL_CONCLUSION: ${{ steps.prepare_report.outcome == 'success' && steps.prepare_report.outputs.overall_conclusion || 'failure' }}
          OVERALL_SUMMARY: ${{ steps.prepare_report.outcome == 'success' && steps.prepare_report.outputs.overall_summary || 'The linter-service workflow failed to generate a combined report.' }}
          UPLOAD_SARIF_OUTCOME: ${{ steps.upload_sarif.outcome }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          overall_conclusion = os.environ["OVERALL_CONCLUSION"]
          overall_summary = os.environ["OVERALL_SUMMARY"]
          upload_sarif_outcome = os.environ.get("UPLOAD_SARIF_OUTCOME", "")

          conclusion = overall_conclusion
          summary = overall_summary
          title = (
              "linter-service completed"
              if conclusion == "success"
              else "linter-service found issues"
          )

          if upload_sarif_outcome == "failure":
              summary = f"{overall_summary} Warning: SARIF upload failed; see the workflow logs."
              if conclusion == "success":
                  title = "linter-service completed with warnings"

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              fh.write(f"conclusion={conclusion}\n")
              fh.write(f"summary={summary}\n")
              fh.write(f"title={title}\n")
          PY
      - name: Finalize processing check run
        if: ${{ always() && needs.detect-targets.outputs.selected-linters-json != '[]' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          CHECK_RUN_CONCLUSION: ${{ steps.prepare_final_summary.outputs.conclusion || 'failure' }}
          CHECK_RUN_EXTERNAL_ID: ${{ steps.decode_repository_context.outputs.processing-check-external-id }}
          CHECK_RUN_HEAD_SHA: ${{ steps.decode_repository_context.outputs.source-head-sha }}
          CHECK_RUN_NAME: ${{ steps.decode_repository_context.outputs.processing-check-name }}
          CHECK_RUN_OUTPUT_SUMMARY: ${{ steps.prepare_final_summary.outputs.summary || 'The linter-service workflow failed to generate a combined report.' }}
          CHECK_RUN_OUTPUT_TEXT_FILE: ${{ runner.temp }}/combined-linter-check-run.md
          CHECK_RUN_OUTPUT_TITLE: ${{ steps.prepare_final_summary.outputs.title || 'linter-service found issues' }}
          CHECK_RUN_OWNER: ${{ steps.decode_repository_context.outputs.source-owner }}
          CHECK_RUN_REPO: ${{ steps.decode_repository_context.outputs.source-repo }}
          CHECK_RUN_STATUS: completed
          LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
          OVERALL_CONCLUSION: ${{ steps.prepare_final_summary.outputs.conclusion || 'failure' }}
          OVERALL_SUMMARY: ${{ steps.prepare_final_summary.outputs.summary || 'The linter-service workflow failed to generate a combined report.' }}
          PROCESSING_CHECK_EXTERNAL_ID: ${{ steps.decode_repository_context.outputs.processing-check-external-id }}
          PROCESSING_CHECK_NAME: ${{ steps.decode_repository_context.outputs.processing-check-name }}
          SOURCE_HEAD_SHA: ${{ steps.decode_repository_context.outputs.source-head-sha }}
          SOURCE_OWNER: ${{ steps.decode_repository_context.outputs.source-owner }}
          SOURCE_REPO: ${{ steps.decode_repository_context.outputs.source-repo }}
        with:
          github-token: ${{ steps.get_source_token.outputs.token }}
          script: |
            const upsertCheckRun = require(
              `${process.env.LINTER_SERVICE_PATH}/.github/scripts/upsert-check-run.js`,
            );
            await upsertCheckRun({ github, env: process.env });
      - name: Fail workflow when lint reports issues
        if: ${{ needs.detect-targets.outputs.selected-linters-json != '[]' && steps.prepare_report.outputs.overall_conclusion != 'success' }}
        env:
          SUMMARY: ${{ steps.prepare_final_summary.outputs.summary }}
        run: |
          echo "$SUMMARY" >&2
          exit 1
      - name: Fail workflow when deselected SARIF upload fails
        if: ${{ needs.detect-targets.outputs.selected-linters-json == '[]' && steps.upload_sarif.outcome == 'failure' }}
        run: |
          echo "SARIF upload failed while clearing deselected linter results. See the workflow logs." >&2
          exit 1

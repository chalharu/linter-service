name: Repository Dispatch

on:
  repository_dispatch:

permissions: {}

jobs:
  run-linter-skeleton:
    runs-on: ubuntu-latest
    steps:
      - name: Get token
        id: get_token
        uses: actions/create-github-app-token@v3.0.0
        with:
          private-key: ${{ secrets.PRIVATE_KEY }}
          app-id: ${{ secrets.APP_ID }}
          owner: ${{ github.repository_owner }}

      - name: Print dispatch metadata
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "repository_dispatch action: ${{ github.event.action }}"
          echo "$CLIENT_PAYLOAD"
          echo "TODO: execute the shared linter workflow for the requested pull request"

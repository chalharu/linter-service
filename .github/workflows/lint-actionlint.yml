name: Actionlint

on:
  workflow_call:
    inputs:
      changed-files-json:
        required: true
        type: string
      source-head-sha:
        required: true
        type: string
      source-owner:
        required: true
        type: string
      source-repo:
        required: true
        type: string
    secrets:
      CHECKER_APP_ID:
        required: true
      CHECKER_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Get checker token
        id: get_checker_token
        uses: actions/create-github-app-token@v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ inputs.source-owner }}
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ inputs.source-repo }}

      - name: Check out source repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ inputs.source-head-sha }}
          repository: ${{ inputs.source-owner }}/${{ inputs.source-repo }}
          token: ${{ steps.get_checker_token.outputs.token }}

      - name: Select workflow files
        id: select_files
        env:
          CHANGED_FILES_JSON: ${{ inputs.changed-files-json }}
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/actionlint-files.txt"
          import json
          import os

          for path in json.loads(os.environ["CHANGED_FILES_JSON"]):
              lower_path = path.lower()
              if lower_path.startswith(".github/workflows/") and lower_path.endswith((".yaml", ".yml")):
                  print(path)
          PY

          count=$(wc -l < "$RUNNER_TEMP/actionlint-files.txt" | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

          if [ "$count" -eq 0 ]; then
            echo "No workflow files matched actionlint."
          else
            echo "Actionlint targets:"
            cat "$RUNNER_TEMP/actionlint-files.txt"
          fi

      - name: Install actionlint
        if: ${{ steps.select_files.outputs.count != '0' }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            -o "$RUNNER_TEMP/download-actionlint.bash"
          bash "$RUNNER_TEMP/download-actionlint.bash" latest

      - name: Run actionlint
        if: ${{ steps.select_files.outputs.count != '0' }}
        run: |
          mapfile -t files < "$RUNNER_TEMP/actionlint-files.txt"
          ./actionlint "${files[@]}"

name: Lint Common

on:
  workflow_call:
    inputs:
      linter-name:
        required: true
        type: string
    outputs:
      comment_body_base64:
        description: Base64-encoded markdown section for this linter
        value: ${{ jobs.run-linter.outputs.comment_body_base64 }}
      conclusion:
        description: success or failure
        value: ${{ jobs.run-linter.outputs.conclusion }}
    secrets:
      CHECKER_APP_ID:
        required: true
      CHECKER_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  run-linter:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      comment_body_base64: ${{ steps.publish_outputs.outputs.comment_body_base64 }}
      conclusion: ${{ steps.publish_outputs.outputs.conclusion }}
    env:
      LINTER_NAME: ${{ inputs.linter-name }}
      LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
      SOURCE_REPOSITORY_PATH: ${{ github.workspace }}/source-repo
    steps:
      - name: Download dispatch context artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: detect-targets-context
          path: ${{ runner.temp }}/detect-targets-context

      - name: Mask repository metadata
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          context = json.loads(Path(os.environ["CONTEXT_PATH"]).read_text(encoding="utf-8"))
          source_owner = context["source_owner"]
          source_repo = context["source_repo"]
          source_head_sha = context["source_head_sha"]

          for value in (source_owner, source_repo, source_head_sha):
              if value:
                  print(f"::add-mask::{value}")

          if source_owner and source_repo:
              print(f"::add-mask::{source_owner}/{source_repo}")
          PY

      - name: Decode repository metadata
        id: decode_context
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          context = json.loads(Path(os.environ["CONTEXT_PATH"]).read_text(encoding="utf-8"))
          values = {
              "source-head-sha": context["source_head_sha"],
              "source-owner": context["source_owner"],
              "source-repo": context["source_repo"],
          }

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              for key, value in values.items():
                  fh.write(f"{key}={value}\n")
          PY

      - name: Get current repository checker token
        id: get_current_repo_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ github.repository_owner }}
          permission-contents: read
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Check out linter-service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: linter-service
          persist-credentials: false
          ref: ${{ github.sha }}
          token: ${{ steps.get_current_repo_token.outputs.token }}

      - name: Get source repository checker token
        id: get_source_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ steps.decode_context.outputs.source-owner }}
          permission-contents: read
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ steps.decode_context.outputs.source-repo }}

      - name: Check out source repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: source-repo
          persist-credentials: false
          ref: ${{ steps.decode_context.outputs.source-head-sha }}
          repository: ${{ steps.decode_context.outputs.source-owner }}/${{ steps.decode_context.outputs.source-repo }}
          token: ${{ steps.get_source_token.outputs.token }}

      - name: Select lint target files
        id: select_files
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
          PATTERN_PATH: ${{ runner.temp }}/linter-patterns.txt
        run: |
          script_path="$LINTER_SERVICE_PATH/.github/scripts/linters/$LINTER_NAME.sh"
          bash "$script_path" patterns > "$PATTERN_PATH"

          python3 - <<'PY' > "$RUNNER_TEMP/selected-files.txt"
          import json
          import os
          import re
          from pathlib import Path

          context = json.loads(Path(os.environ["CONTEXT_PATH"]).read_text(encoding="utf-8"))
          patterns = [
              re.compile(line.strip(), re.IGNORECASE)
              for line in Path(os.environ["PATTERN_PATH"]).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]

          for path in context["changed_files"]:
              if any(pattern.search(path) for pattern in patterns):
                  print(path)
          PY

          count=$(wc -l < "$RUNNER_TEMP/selected-files.txt" | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Install linter tool
        id: install_tool
        if: ${{ steps.select_files.outputs.count != '0' }}
        run: |
          script_path="$LINTER_SERVICE_PATH/.github/scripts/linters/$LINTER_NAME.sh"
          (
            cd "$SOURCE_REPOSITORY_PATH" || exit 1
            bash "$script_path" install
          )

      - name: Run linter
        id: run_linter
        if: ${{ steps.select_files.outputs.count != '0' }}
        env:
          RESULT_PATH: ${{ runner.temp }}/linter-result.json
        run: |
          script_path="$LINTER_SERVICE_PATH/.github/scripts/linters/$LINTER_NAME.sh"
          mapfile -t files < "$RUNNER_TEMP/selected-files.txt"
          (
            cd "$SOURCE_REPOSITORY_PATH" || exit 1
            bash "$script_path" run "${files[@]}" > "$RESULT_PATH"
          )

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(Path(os.environ["RESULT_PATH"]).read_text(encoding="utf-8"))
          exit_code = result.get("exit_code")

          if not isinstance(exit_code, int):
              raise SystemExit("linter result JSON must include integer exit_code")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              fh.write(f"exit_code={exit_code}\n")
          PY

      - name: Prepare linter report
        if: ${{ always() }}
        env:
          FILE_COUNT: ${{ steps.select_files.outputs.count }}
          EXIT_CODE: ${{ steps.run_linter.outputs.exit_code }}
          INSTALL_TOOL_OUTCOME: ${{ steps.install_tool.outcome }}
          LINTER_NAME: ${{ inputs.linter-name }}
          RESULT_PATH: ${{ runner.temp }}/linter-result.json
          RUN_LINTER_OUTCOME: ${{ steps.run_linter.outcome }}
          SELECT_FILES_OUTCOME: ${{ steps.select_files.outcome }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          linter_name = os.environ["LINTER_NAME"]
          file_count = int(os.environ.get("FILE_COUNT", "0") or "0")
          exit_code_raw = os.environ.get("EXIT_CODE", "")
          select_outcome = os.environ.get("SELECT_FILES_OUTCOME", "")
          install_outcome = os.environ.get("INSTALL_TOOL_OUTCOME", "")
          run_outcome = os.environ.get("RUN_LINTER_OUTCOME", "")
          result_path = Path(os.environ["RESULT_PATH"])
          runner_temp = Path(os.environ["RUNNER_TEMP"])
          comment_path = runner_temp / "linter-comment.md"

          config = {
              "actionlint": {
                  "details_fallback": "actionlint did not produce diagnostic output before the job failed.",
                  "heading": "### actionlint",
                  "infra_failure": "❌ The `actionlint` workflow failed before producing a detailed report. See the workflow logs.",
                  "no_files": "No matching workflow files were selected for `actionlint`.",
                  "success": "✅ No issues found in {count} changed GitHub Actions workflow file(s).",
                  "failure": "❌ Issues found in {count} changed GitHub Actions workflow file(s).",
              },
              "ghalint": {
                  "details_fallback": "ghalint did not produce diagnostic output before the job failed.",
                  "heading": "### ghalint",
                  "infra_failure": "❌ The `ghalint` workflow failed before producing a detailed report. See the workflow logs.",
                  "no_files": "No matching GitHub Actions workflow files were selected for `ghalint`.",
                  "success": "✅ No issues found in {count} changed GitHub Actions workflow file(s).",
                  "failure": "❌ Issues found in {count} changed GitHub Actions workflow file(s).",
              },
              "spectral": {
                  "details_fallback": "spectral did not produce diagnostic output before the job failed.",
                  "heading": "### spectral",
                  "infra_failure": "❌ The `spectral` workflow failed before producing a detailed report. See the workflow logs.",
                  "no_files": "No matching YAML or JSON files were selected for `spectral`.",
                  "success": "✅ No issues found in {count} changed YAML or JSON file(s).",
                  "failure": "❌ Issues found in {count} changed YAML or JSON file(s).",
              },
              "yamllint": {
                  "details_fallback": "yamllint did not produce diagnostic output before the job failed.",
                  "heading": "### yamllint",
                  "infra_failure": "❌ The `yamllint` workflow failed before producing a detailed report. See the workflow logs.",
                  "no_files": "No matching YAML files were selected for `yamllint`.",
                  "success": "✅ No issues found in {count} changed YAML file(s).",
                  "failure": "❌ Issues found in {count} changed YAML file(s).",
              },
              "zizmor": {
                  "details_fallback": "zizmor did not produce diagnostic output before the job failed.",
                  "heading": "### zizmor",
                  "infra_failure": "❌ The `zizmor` workflow failed before producing a detailed report. See the workflow logs.",
                  "no_files": "No matching workflow files were selected for `zizmor`.",
                  "success": "✅ No security issues found in {count} changed GitHub Actions workflow file(s).",
                  "failure": "❌ Security issues found in {count} changed GitHub Actions workflow file(s).",
              },
          }

          if linter_name not in config:
              raise SystemExit(f"unsupported linter: {linter_name}")

          linter_config = config[linter_name]
          lines = [linter_config["heading"], ""]
          has_step_failure = "failure" in {select_outcome, install_outcome, run_outcome}
          success = (not has_step_failure) and (file_count == 0 or exit_code_raw == "0")

          if has_step_failure and not result_path.exists():
              lines.append(linter_config["infra_failure"])
          elif file_count == 0 and exit_code_raw == "":
              lines.append(linter_config["no_files"])
          elif success:
              lines.append(linter_config["success"].format(count=file_count))
          else:
              details = linter_config["details_fallback"]
              if result_path.exists():
                  try:
                      result = json.loads(result_path.read_text(encoding="utf-8"))
                  except json.JSONDecodeError:
                      result = {}

                  details = str(result.get("details") or "").strip() or details

              if len(details) > 60000:
                  details = f"{details[:60000]}\n... truncated ..."

              lines.extend(
                  [
                      linter_config["failure"].format(count=file_count),
                      "",
                      "<details><summary>Details</summary>",
                      "",
                      "```text",
                      details,
                      "```",
                      "</details>",
                  ]
              )

          comment_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Publish workflow outputs
        id: publish_outputs
        if: ${{ always() }}
        env:
          FILE_COUNT: ${{ steps.select_files.outputs.count }}
          EXIT_CODE: ${{ steps.run_linter.outputs.exit_code }}
          INSTALL_TOOL_OUTCOME: ${{ steps.install_tool.outcome }}
          RUN_LINTER_OUTCOME: ${{ steps.run_linter.outcome }}
          SELECT_FILES_OUTCOME: ${{ steps.select_files.outcome }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          file_count = int(os.environ.get("FILE_COUNT", "0") or "0")
          exit_code_raw = os.environ.get("EXIT_CODE", "")
          select_outcome = os.environ.get("SELECT_FILES_OUTCOME", "")
          install_outcome = os.environ.get("INSTALL_TOOL_OUTCOME", "")
          run_outcome = os.environ.get("RUN_LINTER_OUTCOME", "")
          has_step_failure = "failure" in {select_outcome, install_outcome, run_outcome}
          conclusion = (
              "success"
              if (not has_step_failure) and (file_count == 0 or exit_code_raw == "0")
              else "failure"
          )

          comment_path = Path(os.environ["RUNNER_TEMP"]) / "linter-comment.md"
          body = comment_path.read_text(encoding="utf-8") if comment_path.exists() else ""
          encoded_body = base64.b64encode(body.encode("utf-8")).decode("ascii")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              fh.write(f"comment_body_base64={encoded_body}\n")
              fh.write(f"conclusion={conclusion}\n")
          PY

name: Lint Common

on:
  workflow_call:
    inputs:
      changed-files-json:
        required: true
        type: string
      check-run-external-id:
        required: true
        type: string
      check-run-name:
        required: true
        type: string
      linter-name:
        required: true
        type: string
      pr-owner:
        required: true
        type: string
      pr-repo:
        required: true
        type: string
      pull-request-number:
        required: true
        type: string
      source-head-sha:
        required: true
        type: string
      source-owner:
        required: true
        type: string
      source-repo:
        required: true
        type: string
    secrets:
      CHECKER_APP_ID:
        required: true
      CHECKER_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  run-linter:
    runs-on: ubuntu-latest
    env:
      LINTER_NAME: ${{ inputs.linter-name }}
    steps:
      - name: Mask repository metadata
        env:
          PR_OWNER: ${{ inputs.pr-owner }}
          PR_REPO: ${{ inputs.pr-repo }}
          SOURCE_HEAD_SHA: ${{ inputs.source-head-sha }}
          SOURCE_OWNER: ${{ inputs.source-owner }}
          SOURCE_REPO: ${{ inputs.source-repo }}
        run: |
          echo "::add-mask::$PR_OWNER"
          echo "::add-mask::$PR_REPO"
          echo "::add-mask::$PR_OWNER/$PR_REPO"
          echo "::add-mask::$SOURCE_OWNER"
          echo "::add-mask::$SOURCE_REPO"
          echo "::add-mask::$SOURCE_OWNER/$SOURCE_REPO"
          echo "::add-mask::$SOURCE_HEAD_SHA"

      - name: Get PR repository checker token
        id: get_pr_token
        uses: actions/create-github-app-token@v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ inputs.pr-owner }}
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ inputs.pr-repo }}

      - name: Get source repository checker token
        id: get_source_token
        uses: actions/create-github-app-token@v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ inputs.source-owner }}
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ inputs.source-repo }}

      - name: Check out source repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ inputs.source-head-sha }}
          repository: ${{ inputs.source-owner }}/${{ inputs.source-repo }}
          token: ${{ steps.get_source_token.outputs.token }}

      - name: Set up Python
        if: ${{ inputs.linter-name == 'yamllint' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Select lint target files
        id: select_files
        env:
          CHANGED_FILES_JSON: ${{ inputs.changed-files-json }}
          LINTER_NAME: ${{ inputs.linter-name }}
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/selected-files.txt"
          import json
          import os

          linter_name = os.environ["LINTER_NAME"]
          files = json.loads(os.environ["CHANGED_FILES_JSON"])

          for path in files:
              lower_path = path.lower()
              if linter_name == "actionlint":
                  if lower_path.startswith(".github/workflows/") and lower_path.endswith((".yaml", ".yml")):
                      print(path)
              elif linter_name == "yamllint":
                  if lower_path.endswith((".yaml", ".yml")):
                      print(path)
              else:
                  raise SystemExit(f"unsupported linter: {linter_name}")
          PY

          count=$(wc -l < "$RUNNER_TEMP/selected-files.txt" | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Install linter tool
        if: ${{ steps.select_files.outputs.count != '0' }}
        env:
          LINTER_NAME: ${{ inputs.linter-name }}
        run: |
          case "$LINTER_NAME" in
            actionlint)
              curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
                -o "$RUNNER_TEMP/download-actionlint.bash"
              bash "$RUNNER_TEMP/download-actionlint.bash" latest
              ;;
            yamllint)
              python -m pip install --upgrade pip yamllint
              ;;
            *)
              echo "unsupported linter: $LINTER_NAME" >&2
              exit 1
              ;;
          esac

      - name: Run linter
        id: run_linter
        if: ${{ steps.select_files.outputs.count != '0' }}
        env:
          LINTER_NAME: ${{ inputs.linter-name }}
        run: |
          set +e
          mapfile -t files < "$RUNNER_TEMP/selected-files.txt"

          case "$LINTER_NAME" in
            actionlint)
              ./actionlint "${files[@]}" > "$RUNNER_TEMP/linter-output.txt" 2>&1
              ;;
            yamllint)
              cat > "$RUNNER_TEMP/yamllint.yaml" <<'EOF'
              extends: default
              rules:
                comments-indentation: disable
                document-start: disable
                line-length: disable
                truthy:
                  check-keys: false
              EOF
              yamllint -c "$RUNNER_TEMP/yamllint.yaml" "${files[@]}" > "$RUNNER_TEMP/linter-output.txt" 2>&1
              ;;
            *)
              echo "unsupported linter: $LINTER_NAME" >&2
              exit 1
              ;;
          esac

          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Prepare linter comment
        if: ${{ always() }}
        env:
          FILE_COUNT: ${{ steps.select_files.outputs.count }}
          EXIT_CODE: ${{ steps.run_linter.outputs.exit_code }}
          LINTER_NAME: ${{ inputs.linter-name }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          linter_name = os.environ["LINTER_NAME"]
          file_count = int(os.environ.get("FILE_COUNT", "0") or "0")
          exit_code_raw = os.environ.get("EXIT_CODE", "")
          exit_code = int(exit_code_raw) if exit_code_raw else (0 if file_count == 0 else 1)
          runner_temp = Path(os.environ["RUNNER_TEMP"])
          output_path = runner_temp / "linter-output.txt"
          comment_path = runner_temp / "linter-comment.md"

          config = {
              "actionlint": {
                  "details_fallback": "actionlint did not produce diagnostic output before the job failed.",
                  "heading": "## actionlint",
                  "no_files": "No matching workflow files were selected for `actionlint`.",
                  "success": "✅ No issues found in {count} changed GitHub Actions workflow file(s).",
                  "failure": "❌ Issues found in {count} changed GitHub Actions workflow file(s).",
              },
              "yamllint": {
                  "details_fallback": "yamllint did not produce diagnostic output before the job failed.",
                  "heading": "## yamllint",
                  "no_files": "No matching YAML files were selected for `yamllint`.",
                  "success": "✅ No issues found in {count} changed YAML file(s).",
                  "failure": "❌ Issues found in {count} changed YAML file(s).",
              },
          }

          if linter_name not in config:
              raise SystemExit(f"unsupported linter: {linter_name}")

          linter_config = config[linter_name]
          marker = f"<!-- linter-service:{linter_name} -->"
          lines = [marker, linter_config["heading"], ""]

          if file_count == 0:
              lines.append(linter_config["no_files"])
          elif exit_code == 0:
              lines.append(linter_config["success"].format(count=file_count))
          else:
              details = (
                  output_path.read_text(encoding="utf-8").strip()
                  if output_path.exists()
                  else linter_config["details_fallback"]
              )
              if len(details) > 60000:
                  details = f"{details[:60000]}\n... truncated ..."

              lines.extend(
                  [
                      linter_config["failure"].format(count=file_count),
                      "",
                      "<details><summary>Details</summary>",
                      "",
                      "```text",
                      details,
                      "```",
                      "</details>",
                  ]
              )

          comment_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upsert linter comment
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          COMMENT_FILE: ${{ runner.temp }}/linter-comment.md
          COMMENT_MARKER: '<!-- linter-service:${{ inputs.linter-name }} -->'
          PR_NUMBER: ${{ inputs.pull-request-number }}
          PR_OWNER: ${{ inputs.pr-owner }}
          PR_REPO: ${{ inputs.pr-repo }}
        with:
          github-token: ${{ steps.get_pr_token.outputs.token }}
          script: |
            const fs = require("node:fs");

            const body = fs.readFileSync(process.env.COMMENT_FILE, "utf8");
            const marker = process.env.COMMENT_MARKER;
            const owner = process.env.PR_OWNER;
            const repo = process.env.PR_REPO;
            const issueNumber = Number(process.env.PR_NUMBER);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body,
            });

      - name: Finalize linter check run
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          CHECK_EXTERNAL_ID: ${{ inputs.check-run-external-id }}
          CHECK_NAME: ${{ inputs.check-run-name }}
          FILE_COUNT: ${{ steps.select_files.outputs.count }}
          LINTER_EXIT_CODE: ${{ steps.run_linter.outputs.exit_code }}
          LINTER_NAME: ${{ inputs.linter-name }}
          SOURCE_HEAD_SHA: ${{ inputs.source-head-sha }}
          SOURCE_OWNER: ${{ inputs.source-owner }}
          SOURCE_REPO: ${{ inputs.source-repo }}
        with:
          github-token: ${{ steps.get_source_token.outputs.token }}
          script: |
            const owner = process.env.SOURCE_OWNER;
            const repo = process.env.SOURCE_REPO;
            const headSha = process.env.SOURCE_HEAD_SHA;
            const externalId = process.env.CHECK_EXTERNAL_ID;
            const name = process.env.CHECK_NAME;
            const linterName = process.env.LINTER_NAME;
            const fileCount = Number(process.env.FILE_COUNT || "0");
            const exitCode = process.env.LINTER_EXIT_CODE;
            const success = fileCount === 0 || !exitCode || exitCode === "0";
            const detailsUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const summaryConfig = {
              actionlint: {
                failure: `Issues found in ${fileCount} changed GitHub Actions workflow file(s). See the pull request comment for details.`,
                noFiles: "No matching workflow files were selected for actionlint.",
                success: `No issues found in ${fileCount} changed GitHub Actions workflow file(s).`,
              },
              yamllint: {
                failure: `Issues found in ${fileCount} changed YAML file(s). See the pull request comment for details.`,
                noFiles: "No matching YAML files were selected for yamllint.",
                success: `No issues found in ${fileCount} changed YAML file(s).`,
              },
            };

            if (!(linterName in summaryConfig)) {
              core.setFailed(`unsupported linter: ${linterName}`);
              return;
            }

            const summary =
              fileCount === 0
                ? summaryConfig[linterName].noFiles
                : success
                  ? summaryConfig[linterName].success
                  : summaryConfig[linterName].failure;
            const output = {
              title: success ? `${name} completed` : `${name} found issues`,
              summary,
            };
            const checkRuns = await github.paginate(
              github.rest.checks.listForRef,
              {
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              },
              (response) => response.data.check_runs,
            );
            const existing = checkRuns.find(
              (checkRun) => checkRun.external_id === externalId,
            );

            if (existing) {
              await github.rest.checks.update({
                owner,
                repo,
                check_run_id: existing.id,
                conclusion: success ? "success" : "failure",
                completed_at: new Date().toISOString(),
                details_url: detailsUrl,
                external_id: externalId,
                output,
                status: "completed",
              });
              return;
            }

            await github.rest.checks.create({
              owner,
              repo,
              name,
              head_sha: headSha,
              status: "completed",
              conclusion: success ? "success" : "failure",
              details_url: detailsUrl,
              external_id: externalId,
              started_at: new Date().toISOString(),
              completed_at: new Date().toISOString(),
              output,
            });

      - name: Fail on linter findings
        if: ${{ steps.select_files.outputs.count != '0' && steps.run_linter.outputs.exit_code != '0' }}
        run: |
          echo "${LINTER_NAME} reported findings." >&2
          exit 1

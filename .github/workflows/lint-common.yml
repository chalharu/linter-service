name: Lint Common

on:
  workflow_call:
    inputs:
      linter-name:
        required: true
        type: string
    secrets:
      CHECKER_APP_ID:
        required: true
      CHECKER_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  run-linter:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LINTER_NAME: ${{ inputs.linter-name }}
      LINTER_CONFIG_PATH: ${{ github.workspace }}/linter-service/.github/scripts/linters/config.json
      LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
      SOURCE_REPOSITORY_PATH: ${{ github.workspace }}/source-repo
    steps:
      - name: Download dispatch context artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: detect-targets-context
          path: ${{ runner.temp }}/detect-targets-context

      - name: Check out linter-service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: linter-service
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Derive summary artifact passphrase
        if: ${{ always() }}
        env:
          CHECKER_PRIVATE_KEY: ${{ secrets.CHECKER_PRIVATE_KEY }}
        run: |
          passphrase="$(node -e 'const crypto = require(\"node:crypto\"); process.stdout.write(crypto.createHmac(\"sha256\", process.env.CHECKER_PRIVATE_KEY).update(process.env.GITHUB_RUN_ID).digest(\"hex\"));')"
          echo "::add-mask::$passphrase"
          echo "ARTIFACT_PASSPHRASE=$passphrase" >> "$GITHUB_ENV"

      - name: Mask repository metadata
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          python3 "$LINTER_SERVICE_PATH/.github/scripts/context-artifact.py" \
            mask \
            "$CONTEXT_PATH" \
            source_owner \
            source_repo \
            source_head_sha

      - name: Decode repository metadata
        id: decode_context
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          python3 "$LINTER_SERVICE_PATH/.github/scripts/context-artifact.py" \
            outputs \
            "$CONTEXT_PATH" \
            source_head_sha=source-head-sha \
            source_owner=source-owner \
            source_repo=source-repo

      - name: Get source repository checker token
        id: get_source_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ steps.decode_context.outputs.source-owner }}
          permission-contents: read
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ steps.decode_context.outputs.source-repo }}

      - name: Check out source repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: source-repo
          persist-credentials: false
          ref: ${{ steps.decode_context.outputs.source-head-sha }}
          repository: ${{ steps.decode_context.outputs.source-owner }}/${{ steps.decode_context.outputs.source-repo }}
          token: ${{ steps.get_source_token.outputs.token }}

      - name: Select lint target files
        id: select_files
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
          PATTERN_PATH: ${{ runner.temp }}/linter-patterns.txt
        run: |
          script_path="$LINTER_SERVICE_PATH/.github/scripts/linters/$LINTER_NAME.sh"
          bash "$script_path" patterns > "$PATTERN_PATH"

          python3 - <<'PY' > "$RUNNER_TEMP/selected-files.txt"
          import json
          import os
          import re
          from pathlib import Path

          context = json.loads(Path(os.environ["CONTEXT_PATH"]).read_text(encoding="utf-8"))
          patterns = [
              re.compile(line.strip(), re.IGNORECASE)
              for line in Path(os.environ["PATTERN_PATH"]).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]

          for path in context["changed_files"]:
              if any(pattern.search(path) for pattern in patterns):
                  print(path)
          PY

          count=$(wc -l < "$RUNNER_TEMP/selected-files.txt" | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Install linter tool
        id: install_tool
        if: ${{ steps.select_files.outputs.count != '0' }}
        run: |
          script_path="$LINTER_SERVICE_PATH/.github/scripts/linters/$LINTER_NAME.sh"
          (
            cd "$LINTER_SERVICE_PATH" || exit 1
            bash "$script_path" install
          )

      - name: Run linter
        id: run_linter
        if: ${{ steps.select_files.outputs.count != '0' }}
        env:
          RESULT_PATH: ${{ runner.temp }}/linter-result.json
        run: |
          script_path="$LINTER_SERVICE_PATH/.github/scripts/linters/$LINTER_NAME.sh"
          mapfile -t files < "$RUNNER_TEMP/selected-files.txt"
          (
            cd "$SOURCE_REPOSITORY_PATH" || exit 1
            bash "$script_path" run "${files[@]}" > "$RESULT_PATH"
          )

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(Path(os.environ["RESULT_PATH"]).read_text(encoding="utf-8"))
          exit_code = result.get("exit_code")

          if not isinstance(exit_code, int):
              raise SystemExit("linter result JSON must include integer exit_code")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as fh:
              fh.write(f"exit_code={exit_code}\n")
          PY

      - name: Prepare linter report
        id: prepare_report
        if: ${{ always() }}
        env:
          FILE_COUNT: ${{ steps.select_files.outputs.count }}
          EXIT_CODE: ${{ steps.run_linter.outputs.exit_code }}
          INSTALL_TOOL_OUTCOME: ${{ steps.install_tool.outcome }}
          LINTER_NAME: ${{ inputs.linter-name }}
          RESULT_PATH: ${{ runner.temp }}/linter-result.json
          RUN_LINTER_OUTCOME: ${{ steps.run_linter.outcome }}
          SELECT_FILES_OUTCOME: ${{ steps.select_files.outcome }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          linter_name = os.environ["LINTER_NAME"]
          file_count = int(os.environ.get("FILE_COUNT", "0") or "0")
          exit_code_raw = os.environ.get("EXIT_CODE", "")
          select_outcome = os.environ.get("SELECT_FILES_OUTCOME", "")
          install_outcome = os.environ.get("INSTALL_TOOL_OUTCOME", "")
          run_outcome = os.environ.get("RUN_LINTER_OUTCOME", "")
          result_path = Path(os.environ["RESULT_PATH"])
          runner_temp = Path(os.environ["RUNNER_TEMP"])
          comment_path = runner_temp / "linter-comment.md"
          summary_path = runner_temp / f"linter-summary-{linter_name}.json"
          config_path = Path(os.environ["LINTER_CONFIG_PATH"])

          config_data = json.loads(config_path.read_text(encoding="utf-8"))
          linters = config_data.get("linters", [])
          if not isinstance(linters, list):
              raise SystemExit("linter config must include a linters array")
          config = {
              item["name"]: item
              for item in linters
              if isinstance(item, dict) and isinstance(item.get("name"), str)
          }

          if linter_name not in config:
              raise SystemExit(f"unsupported linter: {linter_name}")

          linter_config = config[linter_name]
          lines = [linter_config["heading"], ""]
          has_step_failure = "failure" in {select_outcome, install_outcome, run_outcome}
          success = (not has_step_failure) and (file_count == 0 or exit_code_raw == "0")
          conclusion = "success" if success else "failure"

          if has_step_failure and not result_path.exists():
              lines.append(linter_config["infra_failure"])
          elif file_count == 0 and exit_code_raw == "":
              lines.append(linter_config["no_files"])
          elif success:
              lines.append(linter_config["success"].format(count=file_count))
          else:
              details = linter_config["details_fallback"]
              if result_path.exists():
                  try:
                      result = json.loads(result_path.read_text(encoding="utf-8"))
                  except json.JSONDecodeError:
                      result = {}

                  details = str(result.get("details") or "").strip() or details

              if len(details) > 60000:
                  details = f"{details[:60000]}\n... truncated ..."

              lines.extend(
                  [
                      linter_config["failure"].format(count=file_count),
                      "",
                      "<details><summary>Details</summary>",
                      "",
                      "```text",
                      details,
                      "```",
                      "</details>",
                  ]
              )

          comment_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          body = comment_path.read_text(encoding="utf-8")
          summary_path.write_text(
              json.dumps(
                  {
                      "comment_body": body,
                      "conclusion": conclusion,
                      "linter_name": linter_name,
                  }
              ),
              encoding="utf-8",
          )
          PY

      - name: Encrypt linter summary artifact
        id: encrypt_summary
        if: ${{ always() }}
        run: |
          input_path="$RUNNER_TEMP/linter-summary-$LINTER_NAME.json"
          output_path="$RUNNER_TEMP/linter-summary-$LINTER_NAME.json.enc"
          bash "$LINTER_SERVICE_PATH/.github/scripts/secure-artifact.sh" \
            encrypt \
            "$input_path" \
            "$output_path"
          rm -f "$input_path"

      - name: Upload linter summary artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linter-summary-${{ inputs.linter-name }}
          path: ${{ runner.temp }}/linter-summary-${{ inputs.linter-name }}.json.enc
          if-no-files-found: warn
          retention-days: 1

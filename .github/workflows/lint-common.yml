name: Lint Common
on:
  workflow_call:
    inputs:
      artifact-name:
        required: true
        type: string
      linter-names-json:
        required: true
        type: string
    secrets:
      CHECKER_APP_ID:
        required: true
      CHECKER_PRIVATE_KEY:
        required: true
permissions: {}
jobs:
  run-linter:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LINTER_CONFIG_PATH: ${{ github.workspace }}/linter-service/linters.json
      LINTER_NAMES_JSON: ${{ inputs.linter-names-json }}
      LINTER_SERVICE_PATH: ${{ github.workspace }}/linter-service
      SOURCE_REPOSITORY_PATH: ${{ github.workspace }}/source-repo
    steps:
      - name: Download dispatch context artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: detect-targets-context
          path: ${{ runner.temp }}/detect-targets-context
      - name: Check out linter-service repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: linter-service
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: npm
          cache-dependency-path: linter-service/package-lock.json
          node-version: 24
      - name: Install shared Node dependencies
        working-directory: linter-service
        run: npm ci
      - name: Derive artifact passphrase
        env:
          CHECKER_PRIVATE_KEY: ${{ secrets.CHECKER_PRIVATE_KEY }}
        run: |
          passphrase="$(bash "$LINTER_SERVICE_PATH/.github/scripts/artifact-passphrase.sh")"
          echo "::add-mask::$passphrase"
          echo "ARTIFACT_PASSPHRASE=$passphrase" >> "$GITHUB_ENV"
      - name: Decrypt dispatch context artifact
        run: |
          encrypted_path="$RUNNER_TEMP/detect-targets-context/detect-targets-context.json.enc"
          decrypted_path="$RUNNER_TEMP/detect-targets-context/detect-targets-context.json"
          bash "$LINTER_SERVICE_PATH/.github/scripts/secure-artifact.sh" \
            decrypt \
            "$encrypted_path" \
            "$decrypted_path"
          rm -f "$encrypted_path"
      - name: Mask repository metadata
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          python3 "$LINTER_SERVICE_PATH/.github/scripts/context-artifact.py" \
            mask \
            "$CONTEXT_PATH" \
            source_owner \
            source_repo \
            source_head_sha
      - name: Decode repository metadata
        id: decode_context
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          python3 "$LINTER_SERVICE_PATH/.github/scripts/context-artifact.py" \
            outputs \
            "$CONTEXT_PATH" \
            source_head_sha=source-head-sha \
            source_owner=source-owner \
            source_repo=source-repo
      - name: Get source repository checker token
        id: get_source_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.CHECKER_APP_ID }}
          owner: ${{ steps.decode_context.outputs.source-owner }}
          permission-contents: read
          private-key: ${{ secrets.CHECKER_PRIVATE_KEY }}
          repositories: ${{ steps.decode_context.outputs.source-repo }}
      - name: Check out source repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: source-repo
          persist-credentials: false
          ref: ${{ steps.decode_context.outputs.source-head-sha }}
          repository: ${{ steps.decode_context.outputs.source-owner }}/${{ steps.decode_context.outputs.source-repo }}
          token: ${{ steps.get_source_token.outputs.token }}
      - name: Run linter batch
        id: run_linter_batch
        if: ${{ always() }}
        env:
          CONTEXT_PATH: ${{ runner.temp }}/detect-targets-context/detect-targets-context.json
        run: |
          node "$LINTER_SERVICE_PATH/.github/scripts/run-linter-batch.js"
      - name: Encrypt linter summary artifacts
        id: encrypt_summary
        if: ${{ always() }}
        run: |
          shopt -s nullglob
          failures=0
          summary_files=("$RUNNER_TEMP"/linter-summary-*.json)
          if [ "${#summary_files[@]}" -eq 0 ]; then
            exit 0
          fi

          for input_path in "${summary_files[@]}"; do
            output_path="$input_path.enc"
            if ! bash "$LINTER_SERVICE_PATH/.github/scripts/secure-artifact.sh" \
              encrypt \
              "$input_path" \
              "$output_path"; then
              echo "::warning::Failed to encrypt $(basename "$input_path")"
              failures=1
              continue
            fi

            rm -f "$input_path"
          done

          exit "$failures"
      - name: Upload linter summary artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: linter-summary-${{ inputs.artifact-name }}
          path: ${{ runner.temp }}/linter-summary-*.json.enc
          if-no-files-found: warn
          retention-days: 1
      - name: Encrypt linter SARIF artifacts
        id: encrypt_sarif
        if: ${{ always() }}
        run: |
          shopt -s nullglob
          failures=0
          sarif_files=("$RUNNER_TEMP"/linter-sarif-*.sarif)
          if [ "${#sarif_files[@]}" -eq 0 ]; then
            exit 0
          fi

          for input_path in "${sarif_files[@]}"; do
            output_path="$input_path.enc"
            if ! bash "$LINTER_SERVICE_PATH/.github/scripts/secure-artifact.sh" \
              encrypt \
              "$input_path" \
              "$output_path"; then
              echo "::warning::Failed to encrypt $(basename "$input_path")"
              failures=1
              continue
            fi

            rm -f "$input_path"
          done

          exit "$failures"
      - name: Upload linter SARIF artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: linter-sarif-${{ inputs.artifact-name }}
          path: ${{ runner.temp }}/linter-sarif-*.sarif.enc
          if-no-files-found: warn
          retention-days: 1

name: CI
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      fixture-mode:
        default: verify
        description: Whether to verify existing fixture outputs or write fresh outputs for download.
        options:
          - verify
          - write
        required: true
        type: choice
permissions:
  contents: read
jobs:
  validate-worker:
    name: validate-worker + fixture-test-matrix
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      fixture-assignments-json: ${{ steps.collect.outputs.fixture-assignments-json || '[]' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: npm
          cache-dependency-path: |
            package-lock.json
            worker/package-lock.json
          node-version: 24
      - name: Install shared Node dependencies
        run: npm ci
      - name: Run shared Node tests
        run: |
          node --test \
            .github/scripts/aggregate-sarif.test.js \
            .github/scripts/validate-linters-config.test.js \
            .github/scripts/validate-linter-service-config.test.js \
            .github/scripts/linter-service-config.test.js \
            .github/scripts/linter-targeting.test.js \
            .github/scripts/select-lint-targets.test.js \
            .github/scripts/installer-version-pins.test.js \
            .github/scripts/upload-sarif.test.js
      - name: Collect fixture test matrix
        id: collect
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const { buildLinterJobAssignments } = require("./.github/scripts/linter-targeting.js");
          const {
            listLinterConfigs,
            readLintersConfig,
          } = require("./.github/scripts/lib/linter-shared.js");
          const config = readLintersConfig("linters.json");
          const definitions = listLinterConfigs(config).map((definition) => ({
            isolated: definition.isolated,
            name: definition.name,
            patterns: ["."],
          }));
          const selectedLinters = definitions.map((definition) => definition.name);
          const assignments = buildLinterJobAssignments({
            definitions,
            selectedLinters,
          });
          process.stdout.write(
            `fixture-assignments-json=${JSON.stringify(assignments)}\n`,
          );
          NODE
      - name: Install worker dependencies
        working-directory: worker
        run: npm ci
      - name: Run worker validation
        working-directory: worker
        run: npm run check
  validate-linter-fixtures:
    name: validate-linter-fixtures (${{ matrix.assignment.name }})
    needs: validate-worker
    if: ${{ needs.validate-worker.result == 'success' && needs.validate-worker.outputs.fixture-assignments-json != '[]' }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RENOVATE_PUSH_IMAGE: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && 'true' || 'false' }}
    strategy:
      fail-fast: false
      matrix:
        assignment: ${{ fromJSON(needs.validate-worker.outputs.fixture-assignments-json) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Log in to GHCR for Renovate image cache
        if: ${{ env.RENOVATE_PUSH_IMAGE == 'true' }}
        env:
          GHCR_TOKEN: ${{ github.token }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: npm
          cache-dependency-path: package-lock.json
          node-version: 24
      - name: Install shared Node dependencies
        run: npm ci
      - name: Run fixture tests
        env:
          FIXTURE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.fixture-mode || 'verify' }}
          LINTER_NAMES_JSON: ${{ toJSON(matrix.assignment.linter_names) }}
        run: |
          mapfile -t linter_names < <(
            node -e '
            const linterNames = JSON.parse(process.env.LINTER_NAMES_JSON || "[]");
            if (
              !Array.isArray(linterNames) ||
              linterNames.some(
                (linterName) => typeof linterName !== "string" || linterName.length === 0,
              )
            ) {
              throw new Error("LINTER_NAMES_JSON must be a JSON array of non-empty strings");
            }
            for (const linterName of linterNames) {
              console.log(linterName);
            }
            '
          )
          if [ "${#linter_names[@]}" -eq 0 ]; then
            echo "No fixture linters were assigned." >&2
            exit 1
          fi
          if [ "$FIXTURE_MODE" = "write" ]; then
            node .github/scripts/run-fixture-tests.js --write "${linter_names[@]}"
          else
            node .github/scripts/run-fixture-tests.js "${linter_names[@]}"
          fi
      - name: Prepare recorded fixture outputs
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.fixture-mode == 'write' }}
        env:
          LINTER_NAMES_JSON: ${{ toJSON(matrix.assignment.linter_names) }}
        run: |
          upload_root="$RUNNER_TEMP/fixture-record-${{ matrix.assignment.artifact_name }}"
          rm -rf "$upload_root"
          mkdir -p "$upload_root"
          mapfile -t linter_names < <(
            node -e '
            const linterNames = JSON.parse(process.env.LINTER_NAMES_JSON || "[]");
            if (
              !Array.isArray(linterNames) ||
              linterNames.some(
                (linterName) => typeof linterName !== "string" || linterName.length === 0,
              )
            ) {
              throw new Error("LINTER_NAMES_JSON must be a JSON array of non-empty strings");
            }
            for (const linterName of linterNames) {
              console.log(linterName);
            }
            '
          )
          if [ "${#linter_names[@]}" -eq 0 ]; then
            echo "No fixture linters were assigned." >&2
            exit 1
          fi
          shopt -s nullglob
          for linter_name in "${linter_names[@]}"; do
            for fixture_path in \
              "$linter_name"/tests/*/result.json \
              "$linter_name"/tests/*/sarif.json
            do
              mkdir -p "$upload_root/$(dirname "$fixture_path")"
              cp "$fixture_path" "$upload_root/$fixture_path"
            done
          done
      - name: Upload recorded fixture outputs
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.fixture-mode == 'write' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fixture-record-${{ matrix.assignment.artifact_name }}
          path: ${{ runner.temp }}/fixture-record-${{ matrix.assignment.artifact_name }}
          if-no-files-found: error
          retention-days: 1

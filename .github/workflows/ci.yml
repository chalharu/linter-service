name: CI
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      fixture-mode:
        default: verify
        description: Whether to verify existing fixture outputs or write fresh outputs for download.
        options:
          - verify
          - write
        required: true
        type: choice
permissions:
  contents: read
jobs:
  fixture-test-matrix:
    runs-on: ubuntu-latest
    outputs:
      linters: ${{ steps.collect.outputs.linters }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Collect fixture test matrix
        id: collect
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const config = JSON.parse(fs.readFileSync("linters.json", "utf8"));
          const linters = Array.isArray(config.linters)
            ? config.linters
                .filter((entry) => entry && typeof entry.name === "string")
                .map((entry) => entry.name)
            : [];
          process.stdout.write(`linters=${JSON.stringify(linters)}\n`);
          NODE
  validate-linter-fixtures:
    needs: fixture-test-matrix
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        linter: ${{ fromJSON(needs.fixture-test-matrix.outputs.linters) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
      - name: Run fixture tests
        env:
          FIXTURE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.fixture-mode || 'verify' }}
        run: |
          if [ "$FIXTURE_MODE" = "write" ]; then
            node .github/scripts/run-fixture-tests.js --write "${{ matrix.linter }}"
          else
            node .github/scripts/run-fixture-tests.js "${{ matrix.linter }}"
          fi
      - name: Upload recorded fixture outputs
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.fixture-mode == 'write' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fixture-record-${{ matrix.linter }}
          path: |
            ${{ matrix.linter }}/tests/*/result.json
            ${{ matrix.linter }}/tests/*/sarif.json
          if-no-files-found: error
          retention-days: 1
  validate-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: npm
          cache-dependency-path: worker/package-lock.json
          node-version: 24
      - name: Install worker dependencies
        working-directory: worker
        run: npm ci
      - name: Run worker validation
        working-directory: worker
        run: npm run check
